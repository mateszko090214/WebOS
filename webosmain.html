    // ==================== MINESWEEPER ====================
    Apps.minesweeper = function(win, container) {
        const SIZE = 10, MINES = 15;
        let board = [], revealed = [], flagged = [], over = false, won = false;

        const init = () => {
            board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            revealed = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
            flagged = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
            over = false; won = false;

            let placed = 0;
            while (placed < MINES) {
                const x = Math.floor(Math.random() * SIZE), y = Math.floor(Math.random() * SIZE);
                if (board[y][x] !== -1) { board[y][x] = -1; placed++; }
            }

            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    if (board[y][x] === -1) continue;
                    let count = 0;
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (!dy && !dx) continue;
                            const ny = y + dy, nx = x + dx;
                            if (ny >= 0 && ny < SIZE && nx >= 0 && nx < SIZE && board[ny][nx] === -1) count++;
                        }
                    }
                    board[y][x] = count;
                }
            }
        };

        const render = () => {
            const colors = ['', '#0000ff', '#008000', '#ff0000', '#000080', '#800000', '#008080', '#000', '#808080'];
            let html = `<div style="padding:12px;height:100%;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--phosphor);font-family:VT323">
                <div>Mines: ${MINES - flagged.flat().filter(f => f).length} | ${over ? (won ? '🏆 WIN' : '💥 LOSE') : 'Playing'}</div>
                <div style="display:grid;grid-template-columns:repeat(${SIZE},26px);gap:1px;border:3px solid var(--phosphor);padding:3px;background:#000">`;

            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    let bg = '#3a3a5e', content = '', color = '#ffb000';
                    if (revealed[y][x]) {
                        if (board[y][x] === -1) { bg = '#ff4444'; content = '💣'; }
                        else if (board[y][x] > 0) { color = colors[board[y][x]]; content = board[y][x]; bg = '#1a1a3e'; }
                        else bg = '#1a1a3e';
                    } else if (flagged[y][x]) { content = '🚩'; bg = '#5a5a7e'; }

                    html += `<div data-x="${x}" data-y="${y}" style="width:26px;height:26px;background:${bg};display:flex;align-items:center;justify-content:center;color:${color};cursor:pointer;font-weight:bold">${content}</div>`;
                }
            }

            html += `</div></div>`;
            container.innerHTML = html;

            container.querySelectorAll('[data-x]').forEach(cell => {
                const x = parseInt(cell.dataset.x), y = parseInt(cell.dataset.y);

                cell.onclick = () => {
                    if (over || revealed[y][x] || flagged[y][x]) return;

                    if (board[y][x] === -1) {
                        revealed[y][x] = true;
                        over = true;
                        for (let yy = 0; yy < SIZE; yy++)
                            for (let xx = 0; xx < SIZE; xx++)
                                if (board[yy][xx] === -1) revealed[yy][xx] = true;
                    } else {
                        // Flood fill reveal
                        const queue = [[x, y]];
                        while (queue.length) {
                            const [cx, cy] = queue.shift();
                            if (revealed[cy][cx] || flagged[cy][cx]) continue;
                            revealed[cy][cx] = true;
                            if (board[cy][cx] === 0) {
                                for (let dy = -1; dy <= 1; dy++)
                                    for (let dx = -1; dx <= 1; dx++) {
                                        if (!dy && !dx) continue;
                                        const nx = cx + dx, ny = cy + dy;
                                        if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !revealed[ny][nx]) queue.push([nx, ny]);
                                    }
                            }
                        }

                        // Check win
                        let unrevealed = 0;
                        for (let yy = 0; yy < SIZE; yy++)
                            for (let xx = 0; xx < SIZE; xx++)
                                if (!revealed[yy][xx] && board[yy][xx] !== -1) unrevealed++;
                        if (unrevealed === 0) { over = true; won = true; }
                    }
                    render();
                };

                cell.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (over || revealed[y][x]) return;
                    flagged[y][x] = !flagged[y][x];
                    render();
                };
            });
        };

        init();
        render();
    };

    Apps.paint = function(win, container) {
        const colors = ['#000', '#fff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffb000'];
        let curColor = '#ffb000', tool = 'pencil', sz = 3;

        container.innerHTML = `

                    ${colors.map(c => `<div class="pc" data-c="${c}" style="width:24px;height:24px;background:${c};border:2px solid ${c === curColor ? '#fff' : '#333'};cursor:pointer"></div>`).join('')}
                </div>
                <div style="flex:1;background:#000;display:flex;align-items:center;justify-content:center">
                    <canvas id="paint-c" width="640" height="400" style="background:#fff;cursor:crosshair;border:2px solid var(--phosphor)"></canvas>
                </div>
            </div>`;

        const canvas = container.querySelector('#paint-c');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let drawing = false, lx, ly;
        const draw = (x1, y1, x2, y2) => {
            ctx.strokeStyle = tool === 'eraser' ? '#fff' : curColor;
            ctx.lineWidth = tool === 'brush' ? sz * 2 : sz;
            ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        };

        container.querySelectorAll('.pc').forEach(c => c.onclick = () => {
            curColor = c.dataset.c;
            container.querySelectorAll('.pc').forEach(x => x.style.border = '2px solid #333');
            c.style.border = '2px solid #fff';
        });

        container.querySelectorAll('.pt').forEach(t => t.onclick = () => { tool = t.dataset.t; });

        container.querySelector('#paint-clear').onclick = () => { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); };

        canvas.onmousedown = e => {
            drawing = true;
            const r = canvas.getBoundingClientRect();
            lx = (e.clientX - r.left) * (canvas.width / r.width);
            ly = (e.clientY - r.top) * (canvas.height / r.height);
            draw(lx, ly, lx, ly);
        };

        canvas.onmousemove = e => {
            if (!drawing) return;
            const r = canvas.getBoundingClientRect();
            const x = (e.clientX - r.left) * (canvas.width / r.width);
            const y = (e.clientY - r.top) * (canvas.height / r.height);
            draw(lx, ly, x, y);
            lx = x; ly = y;
        };

        canvas.onmouseup = () => drawing = false;
    };

    // ==================== PIXEL ART (simplified) ====================
    Apps.pixelart = function(win, container) {
        const GRID = 32, TILE = 12;
        const colors = ['#000', '#fff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffb000', '#8338ec', '#06ffa5', '#ff006e'];
        let curColor = '#ffb000', curTool = 'pen';
        let grid = Array(GRID * GRID).fill('#1a1a3e');

        container.innerHTML = `
            <div style="display:flex;height:100%;background:#000;color:var(--phosphor);font-family:'VT323',monospace">
                <div style="width:140px;background:#0a0a1e;border-right:1px solid var(--phosphor);padding:10px">
                    <button class="settings-btn pa-tool" data-t="pen" style="display:block;width:100%;margin-bottom:4px">✏️ Pen</button>
                    <button class="settings-btn pa-tool" data-t="eraser" style="display:block;width:100%;margin-bottom:4px">🧽 Eraser</button>
                    <button class="settings-btn pa-tool" data-t="fill" style="display:block;width:100%;margin-bottom:4px">🪣 Fill</button>
                    <div style="margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px">
                        ${colors.map(c => `<div class="pa-c" data-c="${c}" style="width:100%;height:30px;background:${c};border:2px solid ${c === curColor ? '#fff' : '#1a1a3e'};cursor:pointer"></div>`).join('')}
                    </div>
                </div>
                <div style="flex:1;display:flex;align-items:center;justify-content:center;background:#000">
                    <canvas id="pa-c" width="${GRID * TILE}" height="${GRID * TILE}" style="image-rendering:pixelated;border:2px solid var(--phosphor);cursor:crosshair;background:#0a0a1e"></canvas>
                </div>
            </div>`;

        const cvs = container.querySelector('#pa-c');
        const ctx = cvs.getContext('2d');
        let drawing = false;

        const draw = () => {
            for (let i = 0; i < grid.length; i++) {
                ctx.fillStyle = grid[i];
                ctx.fillRect((i % GRID) * TILE, Math.floor(i / GRID) * TILE, TILE, TILE);
            }
        };
        draw();

        cvs.onmousedown = e => {
            drawing = true;
            const r = cvs.getBoundingClientRect();
            const px = Math.floor((e.clientX - r.left) * (cvs.width / r.width) / TILE);
            const py = Math.floor((e.clientY - r.top) * (cvs.height / r.height) / TILE);

            if (curTool === 'fill') {
                const target = grid[py * GRID + px];
                if (target !== curColor) {
                    const stack = [[px, py]];
                    while (stack.length) {
                        const [cx, cy] = stack.pop();
                        if (cx < 0 || cy < 0 || cx >= GRID || cy >= GRID) continue;
                        if (grid[cy * GRID + cx] !== target) continue;
                        grid[cy * GRID + cx] = curColor;
                        stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
                    }
                    draw();
                }
            } else {
                grid[py * GRID + px] = curTool === 'eraser' ? '#1a1a3e' : curColor;
                draw();
            }
        };

        cvs.onmousemove = e => {
            if (!drawing || (curTool !== 'pen' && curTool !== 'eraser')) return;
            const r = cvs.getBoundingClientRect();
            const px = Math.floor((e.clientX - r.left) * (cvs.width / r.width) / TILE);
            const py = Math.floor((e.clientY - r.top) * (cvs.height / r.height) / TILE);
            if (px >= 0 && px < GRID && py >= 0 && py < GRID) {
                grid[py * GRID + px] = curTool === 'eraser' ? '#1a1a3e' : curColor;
                draw();
            }
        };

        cvs.onmouseup = () => drawing = false;
        cvs.onmouseleave = () => drawing = false;

        container.querySelectorAll('.pa-tool').forEach(b => b.onclick = () => curTool = b.dataset.t);
        container.querySelectorAll('.pa-c').forEach(c => c.onclick = () => {
            curColor = c.dataset.c;
            container.querySelectorAll('.pa-c').forEach(x => x.style.border = '2px solid #1a1a3e');
            c.style.border = '2px solid #fff';
        });
    };

    // ==================== SNAKE (simplified) ====================
    Apps.snake = function(win, container) {
        container.innerHTML = '<canvas id="sn-c" width="400" height="400" style="display:block;margin:auto;background:#000;border:2px solid var(--phosphor);image-rendering:pixelated"></canvas>';
        const canvas = container.querySelector('#sn-c');
        const ctx = canvas.getContext('2d');
        let snake = [{ x: 10, y: 10 }], dir = { x: 1, y: 0 }, food = { x: 5, y: 5 }, score = 0, over = false;

        const draw = () => {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = '#ff006e'; ctx.shadowColor = '#ff006e'; ctx.shadowBlur = 10;
            ctx.fillRect(food.x * 20 + 2, food.y * 20 + 2, 16, 16);
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#33ff66' : '#88aa66';
                ctx.shadowBlur = i === 0 ? 8 : 0;
                ctx.fillRect(s.x * 20 + 1, s.y * 20 + 1, 18, 18);
            });
            ctx.shadowBlur = 0;
            if (over) {
                ctx.fillStyle = '#ff4444'; ctx.font = 'bold 30px "Press Start 2P"'; ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 200, 200);
            }
        };

        const step = () => {
            if (over) return;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
                over = true; draw(); return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                food = { x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20) };
            } else snake.pop();
            draw();
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dir.y !== 1) dir = { x: 0, y: -1 };
            else if (e.key === 'ArrowDown' && dir.y !== -1) dir = { x: 0, y: 1 };
            else if (e.key === 'ArrowLeft' && dir.x !== 1) dir = { x: -1, y: 0 };
            else if (e.key === 'ArrowRight' && dir.x !== -1) dir = { x: 1, y: 0 };
        });

        draw();
        win._cleanup = setInterval(step, 150);
    };

                </div>
                <div style="flex:1;position:relative;background:radial-gradient(ellipse at center,#1a0a3e 0%,#000 100%)">
                    <canvas id="ss-c" width="640" height="500" style="width:100%;height:100%;display:block;image-rendering:pixelated"></canvas>
                    <div id="ss-overlay" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.7);text-shadow:0 0 20px var(--phosphor-glow)">
                        <h1 style="font-family:'Press Start 2P',monospace;font-size:32px;margin-bottom:20px">🚀 SPACE SHOOTER</h1>
                        <button class="settings-btn primary" id="ss-start" style="padding:12px 30px;font-size:18px">▶ START</button>
                    </div>
                </div>
            </div>`;

        const cvs = container.querySelector('#ss-c');
        const ctx = cvs.getContext('2d');
        cvs.width = 640; cvs.height = 500;

        const keys = {};
        let running = false, score = 0, hp = 3, wave = 1, weapon = 'NORMAL', specials = 0;
        let player, bullets, enemies, ebullets, powerups, stars, spawnT, animId;

        const init = () => {
            score = 0; hp = 3; wave = 1; weapon = 'NORMAL'; specials = 0;
            player = { x: 320, y: 430, speed: 5, cd: 0 };
            bullets = []; enemies = []; ebullets = []; powerups = []; stars = [];
            for (let i = 0; i < 50; i++) stars.push({ x: Math.random() * 640, y: Math.random() * 500, s: Math.random() * 2 + 0.5 });
            spawnT = 0;
        };

        const shoot = () => {
            if (player.cd > 0) return;
            Audio.beep(800, 40, 'square', 0.04);
            bullets.push({ x: player.x + 14, y: player.y - 6, w: 4, h: 10, dy: -9, dmg: weapon === 'MISSILE' ? 3 : 1 });
            player.cd = 8;
        };

        const update = () => {
            if (keys.ArrowLeft || keys.a) player.x -= player.speed;
            if (keys.ArrowRight || keys.d) player.x += player.speed;
            player.x = Math.max(0, Math.min(608, player.x));
            if (player.cd > 0) player.cd--;
            if (keys[' '] || keys.Space) shoot();

            bullets = bullets.filter(b => (b.y += b.dy) > -20 && b.y < 520);

            spawnT++;
            if (spawnT > 50 - wave * 7) {
                spawnT = 0;
                const types = ['grunt', 'grunt', 'zigzag', 'shooter'];
                if (wave >= 2) types.push('tank');
                const t = { grunt: { w: 28, h: 28, hp: 1, sp: 1.5, sc: 30, c: '#ff4444' }, zigzag: { w: 24, h: 24, hp: 1, sp: 1.8, sc: 50, c: '#ff00ff', pat: 'zig' }, shooter: { w: 32, h: 32, hp: 2, sp: 1, sc: 80, c: '#ff8500', shoots: true }, tank: { w: 40, h: 40, hp: 5, sp: 0.6, sc: 150, c: '#8338ec' } }[types[Math.floor(Math.random() * types.length)]];
                enemies.push({ x: Math.random() * (640 - t.w), y: -t.h, w: t.w, h: t.h, hp: t.hp, sp: t.sp, sc: t.sc, c: t.c, time: 0, pat: t.pat || 'straight', shoots: t.shoots || false });
            }

            enemies = enemies.filter(e => {
                e.time++; e.y += e.sp;
                if (e.pat === 'zigzag') e.x += Math.sin(e.time * 0.1) * 3;
                if (e.shoots && e.time % 80 === 0) ebullets.push({ x: e.x + e.w / 2, y: e.y + e.h, dy: 3 });

                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        e.hp -= b.dmg;
                        bullets.splice(i, 1);
                        if (e.hp <= 0) { score += e.sc; return false; }
                    }
                }

                if (player.x < e.x + e.w && player.x + 32 > e.x && player.y < e.y + e.h && player.y + 32 > e.y) {
                    hp--;
                    return false;
                }
                return e.y < 520;
            });

            powerups = powerups.filter(p => {
                p.y += 1.5;
                if (player.x < p.x + 16 && player.x + 32 > p.x && player.y < p.y + 16 && player.y + 32 > p.y) {
                    if (p.type === 'HEAL') hp = Math.min(5, hp + 1);
                    else if (p.type === 'SPECIAL') specials++;
                    else weapon = p.type;
                    return false;
                }
                return p.y < 520;
            });

            ebullets = ebullets.filter(b => {
                b.y += b.dy;
                if (player.x < b.x + 8 && player.x + 32 > b.x && player.y < b.y + 8 && player.y + 32 > b.y) { hp--; return false; }
                return b.y < 520;
            });

            if (enemies.length === 0) { wave++; if (wave > 5) wave = 5; }

            container.querySelector('#ss-score').textContent = score;
            container.querySelector('#ss-hp').textContent = hp;
            container.querySelector('#ss-wave').textContent = wave;
            container.querySelector('#ss-wpn').textContent = weapon;

            if (hp <= 0) { running = false; if (animId) cancelAnimationFrame(animId); }
        };

        const render = () => {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 640, 500);
            stars.forEach(s => { ctx.fillStyle = '#ffb000'; ctx.fillRect(s.x, s.y, s.s, s.s); });

            if (hp > 0) {
                ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(player.x + 16, player.y);
                ctx.lineTo(player.x, player.y + 32);
                ctx.lineTo(player.x + 10, player.y + 22);
                ctx.lineTo(player.x + 16, player.y + 28);
                ctx.lineTo(player.x + 22, player.y + 22);
                ctx.lineTo(player.x + 32, player.y + 32);
                ctx.closePath(); ctx.fill();
                ctx.shadowBlur = 0;
            }

            bullets.forEach(b => { ctx.fillStyle = '#ffb000'; ctx.fillRect(b.x, b.y, b.w, b.h); });
            ebullets.forEach(b => { ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill(); });
            enemies.forEach(e => { ctx.fillStyle = e.c; ctx.fillRect(e.x, e.y, e.w, e.h); });
        };

        const loop = () => { if (!running) return; update(); render(); animId = requestAnimationFrame(loop); };

        init();
        container.querySelector('#ss-start').onclick = () => {
            document.getElementById('ss-overlay').style.display = 'none';
            running = true;
            loop();
        };

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);

        render();
        win._cleanup = () => {
            running = false;
            if (animId) cancelAnimationFrame(animId);
        };
    };

    /* ============================================================
        9. PERSISTENCE
       ============================================================ */
    function saveState() {
        State.persist = {
            settings: State.settings,
            fileSystem: FS.root,
            workspace: State.workspace
        };
        Storage.save(State.persist);
    }

    /* ============================================================
        10. BOOT INITIALIZATION
       ============================================================ */
    window.addEventListener('load', () => OS.boot());
    setInterval(saveState, 30000);
    window.addEventListener('beforeunload', saveState);
    </script>
</body>
</html>
