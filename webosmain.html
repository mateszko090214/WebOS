<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroOS webOS v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- ============================================================
            CSS STYLES
            ============================================================ -->
    <style>
        /* ===================== Root Variables ===================== */
        :root {
            --phosphor: #ffb000;
            --phosphor-dim: #b87a00;
            --phosphor-glow: rgba(255, 176, 0, 0.6);
            --window-bg: #0d0d1f;
            --panel-bg: #1a1a2e;
            --panel-light: #2a2a4e;
            --panel-border: #4a4a6e;
            --text-light: #e0e0ff;
            --text-dim: #8888aa;
            --green-phos: #33ff66;
            --red-phos: #ff4444;
            --magenta: #ff00ff;
            --cyan: #00ffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Share Tech Mono', monospace; color: var(--text-light); }

        /* ====================== CRT Effects ====================== */
        #crt-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 99999; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0 1px, transparent 1px 3px); mix-blend-mode: multiply; }
        #crt-overlay::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); }
        #crt-overlay::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent); animation: flicker 0.15s infinite; }
        #crt-chroma { position: fixed; inset: 0; pointer-events: none; z-index: 99998; background: linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,255,0.03)); mix-blend-mode: screen; }
        #crt-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 99997; box-shadow: inset 0 0 200px rgba(0,0,0,0.85); }
        #power-led { position: fixed; bottom: 8px; right: 8px; width: 10px; height: 10px; border-radius: 50%; background: var(--green-phos); box-shadow: 0 0 8px var(--green-phos); z-index: 99999; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: .7; } 50% { opacity: 1; } }
        @keyframes flicker { 0%, 100% { opacity: .95; } 50% { opacity: 1; } }

        /* ======================= Boot Screen ======================= */
        #boot-screen { position: fixed; inset: 0; background: #000; color: var(--phosphor); font-family: 'VT323', monospace; font-size: 17px; z-index: 10000; padding: 25px; overflow: hidden; text-shadow: 0 0 5px var(--phosphor-glow); }
        #boot-screen .boot-line { margin: 1px 0; opacity: 0; animation: fadein .2s forwards; white-space: pre; }
        @keyframes fadein { to { opacity: 1; } }
        .boot-logo { font-family: 'Press Start 2P', monospace; font-size: 28px; text-align: center; margin: 30px 0; color: var(--phosphor); text-shadow: 0 0 20px var(--phosphor-glow); animation: logoglow 1.5s ease-in-out infinite alternate; }
        @keyframes logoglow { from { text-shadow: 0 0 10px var(--phosphor-glow); } to { text-shadow: 0 0 30px var(--phosphor-glow), 0 0 60px var(--phosphor-glow); } }
        .boot-progress { margin-top: 25px; border: 2px solid var(--phosphor); padding: 3px; width: 400px; box-shadow: 0 0 10px var(--phosphor-glow); }
        .boot-progress-bar { height: 18px; background: var(--phosphor); width: 0%; transition: width .15s; box-shadow: 0 0 8px var(--phosphor-glow); }
        .boot-cursor { display: inline-block; width: 9px; height: 16px; background: var(--phosphor); animation: blink 1s infinite; vertical-align: middle; margin-left: 3px; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .boot-ok::after { content: " [ OK ]"; color: var(--green-phos); }

        /* ======================= Login Screen ======================= */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(ellipse at center, #1a0a3e 0%, #000 100%); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; }
        #login-screen::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,.2) 0 1px, transparent 1px 4px); pointer-events: none; }
        .login-frame { border: 3px solid var(--phosphor); padding: 35px 50px; background: rgba(10,10,20,.92); box-shadow: 0 0 40px var(--phosphor-glow); text-align: center; }
        .login-title { font-family: 'Press Start 2P', monospace; font-size: 24px; color: var(--phosphor); text-shadow: 0 0 15px var(--phosphor-glow); margin-bottom: 25px; }
        .login-avatar { width: 90px; height: 90px; border: 3px solid var(--phosphor); border-radius: 50%; margin: 0 auto 18px; background: linear-gradient(135deg, var(--phosphor), var(--phosphor-dim)); display: flex; align-items: center; justify-content: center; font-family: 'Press Start 2P', monospace; font-size: 34px; color: #000; }
        .login-input { background: #000; border: 2px solid var(--phosphor); color: var(--phosphor); font-family: 'VT323', monospace; font-size: 20px; padding: 7px 11px; width: 240px; text-align: center; outline: none; box-shadow: 0 0 10px var(--phosphor-glow); margin-top: 15px; }
        .login-btn { margin-top: 18px; background: var(--phosphor); color: #000; border: 2px solid var(--phosphor); padding: 7px 28px; font-family: 'Press Start 2P', monospace; font-size: 11px; cursor: pointer; box-shadow: 0 0 15px var(--phosphor-glow); }

        /* ======================= Desktop ======================= */
        #desktop { position: fixed; inset: 0; display: none; background: #000; }
        #wallpaper { position: absolute; inset: 0; overflow: hidden; }
        .wp-default { background: radial-gradient(circle at 20% 30%, rgba(255,0,255,.15) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(0,255,255,.15) 0%, transparent 40%), linear-gradient(180deg, #1a0a3e 0%, #2a1a5e 50%, #0a0a2e 100%); }
        .wp-default::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,176,0,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,176,0,.05) 1px, transparent 1px); background-size: 40px 40px; animation: gridmove 20s linear infinite; }
        @keyframes gridmove { to { background-position: 40px 40px; } }
        .wp-sun { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, var(--magenta) 0%, var(--phosphor) 50%, transparent 70%); filter: blur(3px); opacity: .6; animation: sunpulse 4s ease-in-out infinite; }
        @keyframes sunpulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }
        .wp-mountains { position: absolute; bottom: 0; left: 0; right: 0; height: 200px; background: linear-gradient(180deg, transparent 0%, #1a0a3e 100%); clip-path: polygon(0 60%, 15% 30%, 30% 50%, 45% 20%, 60% 40%, 75% 15%, 90% 35%, 100% 25%, 100% 100%, 0 100%); }
        .wp-matrix { background: #000; }
        .matrix-canvas { position: absolute; inset: 0; }
        .wp-stars { background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%); }
        .stars-canvas { position: absolute; inset: 0; }

        /* ======================= Desktop Icons ======================= */
        #desktop-icons { position: absolute; inset: 0 0 50px 0; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, 86px); grid-auto-rows: 96px; gap: 8px; align-content: start; }
        .desktop-icon { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px; border: 2px solid transparent; cursor: pointer; transition: all .15s; text-align: center; }
        .desktop-icon:hover { background: rgba(255,176,0,.15); border-color: var(--phosphor); transform: translateY(-2px); }
        .desktop-icon-img { font-size: 34px; }
        .desktop-icon-label { font-family: 'VT323', monospace; font-size: 13px; color: var(--phosphor); text-shadow: 1px 1px 0 #000; }

        /* ======================= Taskbar ======================= */
        #taskbar { position: fixed; bottom: 0; left: 0; right: 0; height: 44px; background: linear-gradient(180deg, #2a2a5e 0%, #1a1a3e 100%); border-top: 2px solid var(--phosphor); display: flex; align-items: center; padding: 3px; z-index: 5000; }
        #start-button { height: 38px; padding: 0 14px; background: linear-gradient(180deg, #4a4a7e, #2a2a4e); border: 2px solid var(--phosphor); color: var(--phosphor); font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        #start-button:hover { background: linear-gradient(180deg, #6a6a9e, #4a4a7e); }
        #taskbar-apps { flex: 1; display: flex; gap: 3px; padding: 0 6px; overflow-x: auto; }
        .taskbar-app { height: 38px; padding: 0 10px; background: linear-gradient(180deg, #3a3a5e, #1a1a3e); border: 1px solid var(--panel-border); color: var(--text-light); font-family: 'VT323', monospace; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; min-width: 140px; max-width: 220px; white-space: nowrap; overflow: hidden; }
        .taskbar-app:hover { background: linear-gradient(180deg, #5a5a7e, #3a3a5e); border-color: var(--phosphor); }
        .taskbar-app.active { background: linear-gradient(180deg, #5a5a9e, #3a3a6e); border-color: var(--phosphor); box-shadow: inset 0 -2px 0 var(--phosphor); }
        .taskbar-app-icon { font-size: 16px; }
        .taskbar-app-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .taskbar-app-close { background: var(--red-phos); color: #000; border: none; width: 16px; height: 16px; font-size: 10px; cursor: pointer; display: none; }
        .taskbar-app:hover .taskbar-app-close { display: flex; }
        #system-tray { display: flex; align-items: center; gap: 6px; padding: 0 10px; height: 38px; background: rgba(0,0,0,.4); border: 1px solid var(--panel-border); color: var(--phosphor); font-family: 'VT323', monospace; font-size: 16px; }
        .tray-item { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 3px 5px; border: 1px solid transparent; }
        .tray-item:hover { border-color: var(--phosphor); }
        #clock { color: var(--phosphor); }

        /* ======================= Start Menu ======================= */
        #start-menu { position: fixed; bottom: 48px; left: 3px; width: 520px; background: linear-gradient(180deg, #2a2a5e, #1a1a3e); border: 2px solid var(--phosphor); box-shadow: 0 0 30px rgba(255,176,0,.5); z-index: 6000; display: none; flex-direction: column; max-height: 620px; }
        #start-menu.show { display: flex; }
        .start-header { background: linear-gradient(180deg, var(--phosphor), var(--phosphor-dim)); color: #000; padding: 10px 14px; font-family: 'Press Start 2P', monospace; font-size: 13px; display: flex; align-items: center; justify-content: space-between; }
        .start-search { padding: 7px; border-bottom: 1px solid var(--panel-border); }
        .start-search input { width: 100%; background: #000; border: 1px solid var(--phosphor); color: var(--phosphor); padding: 5px 7px; font-family: 'VT323', monospace; font-size: 15px; outline: none; }
        .start-tabs { display: flex; border-bottom: 1px solid var(--panel-border); background: #0a0a1e; }
        .start-tab { flex: 1; padding: 7px; text-align: center; cursor: pointer; color: var(--phosphor-dim); font-size: 14px; border-bottom: 2px solid transparent; }
        .start-tab.active { color: var(--phosphor); border-bottom-color: var(--phosphor); background: rgba(255,176,0,.15); }
        .start-apps { flex: 1; overflow-y: auto; padding: 7px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .start-app { display: flex; flex-direction: column; align-items: center; padding: 10px 3px; border: 1px solid transparent; cursor: pointer; text-align: center; border-radius: 3px; }
        .start-app:hover { background: rgba(255,176,0,.2); border-color: var(--phosphor); }
        .start-app-icon { font-size: 26px; }
        .start-app-name { font-size: 13px; color: var(--phosphor); }
        .start-footer { border-top: 1px solid var(--panel-border); padding: 6px; display: flex; justify-content: space-between; gap: 6px; }
        .start-footer-btn { padding: 5px 11px; background: linear-gradient(180deg, #4a4a7e, #2a2a4e); border: 1px solid var(--phosphor); color: var(--phosphor); font-family: 'VT323', monospace; font-size: 14px; cursor: pointer; flex: 1; }

        /* ======================= Windows ======================= */
        .window { position: absolute; background: var(--window-bg); border: 2px solid var(--phosphor); box-shadow: 0 0 30px rgba(255,176,0,.4); display: flex; flex-direction: column; min-width: 280px; min-height: 180px; overflow: hidden; animation: winopen .25s; resize: both; }
        @keyframes winopen { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .window.minimized { display: none; }
        .window-titlebar { padding: 3px 5px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--phosphor); cursor: move; height: 26px; background: linear-gradient(180deg, #3a3a6e, #2a2a4e); }
        .window.active .window-titlebar { background: linear-gradient(180deg, #5a5a9e, #3a3a6e); }
        .window-titlebar-text { display: flex; align-items: center; gap: 5px; font-family: 'VT323', monospace; font-size: 15px; color: var(--phosphor); flex: 1; padding-left: 4px; }
        .window-controls { display: flex; gap: 2px; }
        .win-btn { width: 22px; height: 22px; border: 1px solid var(--panel-border); background: linear-gradient(180deg, #4a4a7e, #2a2a4e); color: var(--phosphor); font-size: 11px; cursor: pointer; }
        .win-btn.close:hover { background: var(--red-phos); }
        .window-content { flex: 1; overflow: auto; background: var(--window-bg); }
        .window-content::-webkit-scrollbar { width: 12px; }
        .window-content::-webkit-scrollbar-thumb { background: var(--phosphor); }
        .window-statusbar { background: linear-gradient(180deg, #2a2a4e, #1a1a3e); border-top: 1px solid var(--panel-border); padding: 2px 7px; font-family: 'VT323', monospace; font-size: 12px; color: var(--phosphor-dim); display: flex; justify-content: space-between; }
        .resize-handle { position: absolute; z-index: 10; }
        .resize-n { top: -3px; left: 8px; right: 8px; height: 6px; cursor: n-resize; }
        .resize-s { bottom: -3px; left: 8px; right: 8px; height: 6px; cursor: s-resize; }
        .resize-w { left: -3px; top: 8px; bottom: 8px; width: 6px; cursor: w-resize; }
        .resize-e { right: -3px; top: 8px; bottom: 8px; width: 6px; cursor: e-resize; }
        .resize-nw { top: -3px; left: -3px; width: 12px; height: 12px; cursor: nw-resize; }
        .resize-ne { top: -3px; right: -3px; width: 12px; height: 12px; cursor: ne-resize; }
        .resize-sw { bottom: -3px; left: -3px; width: 12px; height: 12px; cursor: sw-resize; }
        .resize-se { bottom: -3px; right: -3px; width: 12px; height: 12px; cursor: se-resize; }

        /* ======================= Notifications & Context Menu ======================= */
        #context-menu { position: fixed; background: linear-gradient(180deg, #2a2a5e, #1a1a3e); border: 2px solid var(--phosphor); z-index: 7000; min-width: 200px; font-family: 'VT323', monospace; display: none; padding: 3px; }
        #context-menu.show { display: block; }
        .context-item { padding: 5px 22px 5px 26px; cursor: pointer; color: var(--phosphor); font-size: 14px; display: flex; align-items: center; gap: 7px; }
        .context-item:hover { background: rgba(255,176,0,.3); }
        .context-separator { height: 1px; background: var(--panel-border); margin: 3px 7px; }
        #notification-area { position: fixed; top: 8px; right: 8px; z-index: 8000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .notification { background: linear-gradient(180deg, #2a2a5e, #1a1a3e); border: 2px solid var(--phosphor); box-shadow: 0 0 20px var(--phosphor-glow); padding: 10px 14px; min-width: 260px; max-width: 340px; font-family: 'VT323', monospace; animation: notifin .3s; pointer-events: auto; position: relative; }
        @keyframes notifin { from { transform: translateX(380px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .notif-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--phosphor); margin-bottom: 3px; }
        .notif-body { color: var(--text-light); font-size: 14px; }
        .notif-close { position: absolute; top: 3px; right: 3px; background: none; border: none; color: var(--phosphor); cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 9500; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: linear-gradient(180deg, #2a2a5e, #1a1a3e); border: 2px solid var(--phosphor); padding: 22px; min-width: 360px; font-family: 'VT323', monospace; }
        .modal-title { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--phosphor); margin-bottom: 14px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 7px; }
        .settings-btn { padding: 6px 14px; background: linear-gradient(180deg, #4a4a7e, #2a2a4e); border: 1px solid var(--phosphor); color: var(--phosphor); font-family: 'VT323', monospace; font-size: 14px; cursor: pointer; }
        .settings-btn.danger { background: linear-gradient(180deg, var(--red-phos), #aa2222); color: #000; }
        .settings-btn.primary { background: linear-gradient(180deg, var(--phosphor), var(--phosphor-dim)); color: #000; }
        .toggle { width: 50px; height: 22px; background: #000; border: 1px solid var(--panel-border); border-radius: 11px; position: relative; cursor: pointer; }
        .toggle.on { background: var(--phosphor); }
        .toggle::after { content: ""; position: absolute; width: 16px; height: 16px; background: var(--phosphor); border-radius: 50%; top: 2px; left: 2px; }
        .toggle.on::after { left: 28px; background: #000; }
        .settings-input, .settings-select { background: #000; border: 1px solid var(--phosphor); color: var(--phosphor); padding: 4px 7px; font-family: 'VT323', monospace; font-size: 14px; outline: none; }
        .particle { position: fixed; width: 3px; height: 3px; background: var(--phosphor); border-radius: 50%; pointer-events: none; z-index: 99996; box-shadow: 0 0 4px var(--phosphor); }
        #shutdown-screen { position: fixed; inset: 0; background: #000; color: var(--phosphor); display: none; align-items: center; justify-content: center; flex-direction: column; font-family: 'VT323', monospace; z-index: 9999; }

        /* ======================= Terminal-specific ======================= */
        .terminal-app { background: #000; color: var(--green-phos); font-family: 'VT323', monospace; font-size: 15px; padding: 10px; height: 100%; overflow-y: auto; text-shadow: 0 0 4px rgba(51,255,102,.6); cursor: text; }
        .terminal-line { white-space: pre-wrap; }
        .terminal-prompt { color: var(--phosphor); }
        .terminal-info { color: var(--cyan); }
        .terminal-error { color: var(--red-phos); }
        .terminal-input-line { display: flex; align-items: center; }
        .term-input { flex: 1; background: transparent; border: none; outline: none; color: var(--green-phos); font-family: inherit; font-size: inherit; }
    </style>
</head>
<body>
    <!-- ==================== CRT OVERLAYS ==================== -->
    <div id="crt-overlay"></div>
    <div id="crt-chroma"></div>
    <div id="crt-vignette"></div>
    <div id="power-led"></div>
    <div id="snap-preview"></div>
    <div id="clipboard-indicator">📋 Copied: <span id="clipboard-text"></span></div>

    <!-- ==================== BOOT SCREEN ==================== -->
    <div id="boot-screen">
        <div class="boot-logo">RetroOS webOS v2.0</div>
        <div id="boot-log"></div>
        <div class="boot-progress"><div class="boot-progress-bar" id="boot-progress"></div></div>
        <div style="margin-top:12px;font-size:14px;color:var(--phosphor-dim)" id="boot-status">Initializing...</div>
    </div>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen">
        <div class="login-frame">
            <div class="login-title">RetroOS webOS</div>
            <div class="login-avatar">R</div>
            <div style="color:var(--phosphor);font-size:18px">Welcome back, <span id="login-user">retro</span></div>
            <input type="password" id="login-password" class="login-input" placeholder="****" autocomplete="off">
            <br>
            <button class="login-btn" id="login-btn">LOGIN</button>
            <div style="margin-top:12px;font-size:14px;color:var(--phosphor-dim)">Press ENTER (any password works)</div>
        </div>
    </div>

    <!-- ==================== DESKTOP ==================== -->
    <div id="desktop">
        <div id="wallpaper"></div>
        <div id="desktop-icons"></div>
        <div id="windows-container"></div>

        <!-- Taskbar -->
        <div id="taskbar">
            <button id="start-button"><span>▣</span><span>START</span></button>
            <div id="taskbar-apps"></div>
            <div id="system-tray">
                <div class="tray-item" id="tray-notif">🔔</div>
                <div class="tray-item" id="tray-volume">🔊 <span id="volume-level">75</span>%</div>
                <div class="tray-item" id="tray-cpu">⚡ <span id="cpu-level">--</span>%</div>
                <div class="tray-item" id="clock">--:--:--</div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu">
            <div class="start-header">
                <span>▣ RetroOS webOS v2.0</span>
                <span id="start-user" style="font-size:10px">@retro</span>
            </div>
            <div class="start-search"><input type="text" id="start-search" placeholder="🔍 Search apps..."></div>
            <div class="start-tabs">
                <div class="start-tab active" data-tab="all">All</div>
                <div class="start-tab" data-tab="system">System</div>
                <div class="start-tab" data-tab="utility">Utility</div>
                <div class="start-tab" data-tab="media">Media</div>
                <div class="start-tab" data-tab="games">Games</div>
            </div>
            <div class="start-apps" id="start-apps"></div>
            <div class="start-footer">
                <button class="start-footer-btn" data-action="settings">⚙️</button>
                <button class="start-footer-btn" data-action="files">📁</button>
                <button class="start-footer-btn" data-action="taskmgr">📊</button>
                <button class="start-footer-btn" data-action="store">🛒</button>
                <button class="start-footer-btn" data-action="power">⏻</button>
            </div>
        </div>

        <!-- Context Menu & Notifications -->
        <div id="context-menu"></div>
        <div id="notification-area"></div>

        <!-- Power Modal -->
        <div class="modal-overlay" id="power-modal">
            <div class="modal">
                <div class="modal-title">⏻ POWER OPTIONS</div>
                <div class="modal-body" style="margin-bottom:15px">Choose action:</div>
                <div class="modal-buttons">
                    <button class="settings-btn" data-power="sleep">💤 Sleep</button>
                    <button class="settings-btn" data-power="restart">🔄 Restart</button>
                    <button class="settings-btn danger" data-power="shutdown">⏻ Shutdown</button>
                    <button class="settings-btn" id="power-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SHUTDOWN SCREEN ==================== -->
    <div id="shutdown-screen">
        <div class="boot-logo" style="font-size:18px" id="shutdown-msg">SYSTEM HALTED</div>
        <div class="boot-cursor"></div>
        <div style="margin-top:25px;color:var(--phosphor-dim)">It is now safe to power off</div>
        <button class="login-btn" style="margin-top:25px" onclick="location.reload()">REBOOT</button>
    </div>

    <!-- ============================================================
            JAVASCRIPT - MODULAR ARCHITECTURE
            ============================================================ -->
    <script>
    'use strict';

    /* ============================================================
        1. STORAGE MODULE - localStorage persistence
       ============================================================ */
    const Storage = {
        KEY: 'retroos_state_v2',

        save(data) {
            try { localStorage.setItem(this.KEY, JSON.stringify(data)); } 
            catch (e) { console.warn('Storage save failed:', e); }
        },

        load() {
            try {
                const data = localStorage.getItem(this.KEY);
                return data ? JSON.parse(data) : null;
            } 
            catch (e) { return null; }
        },

        clear() { localStorage.removeItem(this.KEY); }
    };

    /* ============================================================
        2. AUDIO MODULE - Web Audio API sound effects
       ============================================================ */
    const Audio = {
        ctx: null,

        init() {
            if (!this.ctx) {
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
                catch (e) {}
            }
            if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
        },

        beep(freq = 800, dur = 50, type = 'square', vol = 0.04) {
            if (!this.ctx) return;
            try {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur / 1000);
                osc.connect(gain).connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + dur / 1000);
            } catch (e) {}
        },

        startup() {
            this.init();
            this.beep(800, 100);
            setTimeout(() => this.beep(1200, 150), 150);
        },

        click() { this.init(); this.beep(1500, 15, 'square', 0.02); },

        notify() {
            this.init();
            this.beep(880, 80);
            setTimeout(() => this.beep(1320, 80), 100);
        }
    };

    /* ============================================================
        3. KERNEL MODULE - Luna Service Bus & Process Management
       ============================================================ */
    const Kernel = {
        services: {},
        processes: [],
        nextPid: 1000,
        bootTime: Date.now(),

        init() {
            // Register Luna services
            const svcList = ['audio', 'video', 'system', 'applicationManager', 'settings', 'power',
                            'bluetooth', 'network', 'storage', 'notification', 'display',
                            'input', 'activityManager', 'clipboard'];

            svcList.forEach(name => {
                this.services[name] = {
                    uri: 'com.webos.service.' + name,
                    status: 'running',
                    pid: this.nextPid++,
                    calls: 0
                };
            });

            // Init system processes
            this.processes = [
                { pid: 1, name: 'init', user: 'root', cpu: 0.1, mem: 8, status: 'running', system: true },
                { pid: this.nextPid++, name: 'luna-bus', user: 'root', cpu: 1.5, mem: 42, status: 'running', system: true },
                { pid: this.nextPid++, name: 'luna-service-manager', user: 'root', cpu: 0.8, mem: 28, status: 'running', system: true },
                { pid: this.nextPid++, name: 'weston-retro', user: 'root', cpu: 2.5, mem: 75, status: 'running', system: true },
                { pid: this.nextPid++, name: 'pulseaudio', user: 'retro', cpu: 0.5, mem: 22, status: 'running', system: true },
                { pid: this.nextPid++, name: 'NetworkManager', user: 'root', cpu: 0.6, mem: 30, status: 'running', system: true },
                { pid: this.nextPid++, name: 'dbus-daemon', user: 'messagebus', cpu: 0.1, mem: 10, status: 'running', system: true }
            ];
        },

        // Luna Service Bus IPC call
        call(uri, method, params = {}) {
            const match = uri.match(/com\.webos\.service\.(\w+)/);
            const name = match ? match[1] : null;
            const svc = this.services[name];
            if (!svc) return { returnValue: false, error: 'Service not found' };
            svc.calls++;

            // Service handlers
            const handlers = {
                audio: {
                    getStatus: () => ({ returnValue: true, volume: State.settings.volume }),
                    setVolume: (p) => {
                        State.settings.volume = p.volume;
                        document.getElementById('volume-level').textContent = p.volume;
                        return { returnValue: true };
                    },
                    playSound: (p) => { Audio.beep(p.frequency || 800, p.duration || 100); return { returnValue: true }; }
                },
                system: {
                    getSystemInfo: () => ({ returnValue: true, version: '3.14.159', kernel: '6.7.0-retro', uptime: Date.now() - this.bootTime }),
                    reboot: () => { setTimeout(() => location.reload(), 500); return { returnValue: true }; },
                    shutdown: () => { OS.shutdown(); return { returnValue: true }; }
                },
                applicationManager: {
                    launchApp: (p) => { OS.openApp(p.id); return { returnValue: true }; },
                    listApps: () => ({ returnValue: true, apps: AppRegistry.list.filter(a => a.installed).map(a => ({ id: a.id, title: a.title })) }),
                    closeApp: (p) => { const w = State.windows.find(w => w.appId === p.id); if (w) OS.closeWindow(w.id); return { returnValue: true }; }
                },
                network: {
                    getStatus: () => ({ returnValue: true, ssid: 'RETRO_NET', ip: '192.168.1.42' })
                },
                storage: {
                    listDir: (p) => {
                        const r = FS.resolve(p.path || '/home/retro');
                        return r ? { returnValue: true, entries: Object.keys(r.node.children) } : { returnValue: false };
                    }
                },
                clipboard: {
                    setText: (p) => { OS.clipboard = p.text; OS.showClipboard(p.text); return { returnValue: true }; }
                },
                notification: {
                    create: (p) => { OS.notify(p.title, p.body); return { returnValue: true }; }
                }
            };

            const handler = handlers[name] && handlers[name][method];
            return handler ? handler(params) : { returnValue: true };
        },

        addProcess(p) {
            p.pid = p.pid || this.nextPid++;
            this.processes.push(p);
            return p.pid;
        },

        removeProcess(pid) {
            this.processes = this.processes.filter(p => p.pid !== pid);
        },

        killProcess(pid) {
            const win = State.windows.find(w => w.pid === pid);
            if (win) OS.closeWindow(win.id);
            this.removeProcess(pid);
        }
    };

    /* ============================================================
        4. FILESYSTEM MODULE - Virtual filesystem
       ============================================================ */
    const FS = {
        root: null,
        defaults: {
            '/': { type: 'dir', children: {
                home: { type: 'dir', children: {
                    retro: { type: 'dir', children: {
                        Documents: { type: 'dir', children: {
                            'readme.txt': { type: 'file', content: 'Welcome to RetroOS webOS v2.0!', size: 256, modified: Date.now() }
                        }}
                    }}
                }},
                etc: { type: 'dir', children: {
                    retroos: { type: 'dir', children: {
                        version: { type: 'file', content: '3.14.159' }
                    }}
                }}
            }}
        },

        init() {
            const saved = Storage.load();
            this.root = (saved && saved.fileSystem) ? saved.fileSystem : JSON.parse(JSON.stringify(this.defaults));
        },

        save() {
            State.persist.fileSystem = this.root;
            Storage.save(State.persist);
        },

        resolve(path) {
            if (!path) path = '/home/retro';
            if (!path.startsWith('/')) path = '/' + path;
            const parts = path.split('/').filter(p => p);
            let current = this.root['/'];
            for (const part of parts) {
                if (!current.children || !current.children[part]) return null;
                current = current.children[part];
            }
            return { node: current, path };
        }
    };

    /* ============================================================
        5. STATE MODULE - Global application state
       ============================================================ */
    const State = {
        windows: [],
        activeWindow: null,
        nextZIndex: 100,
        nextWindowId: 1,
        workspace: 0,
        workspaces: 4,
        clipboard: '',
        notifications: [],
        particleEnabled: true,
        settings: {
            volume: 75,
            brightness: 80,
            theme: 'amber',
            scanlines: true,
            wallpaper: 'default',
            username: 'retro',
            hostname: 'retroos-pc'
        },
        persist: {},

        loadDefaults() {
            const saved = Storage.load();
            if (saved) {
                Object.assign(this.settings, saved.settings || {});
                this.workspace = saved.workspace || 0;
            }
        }
    };

    /* ============================================================
        6. APP REGISTRY - Installed & available applications
       ============================================================ */
    const AppRegistry = {
        // Installed apps
        list: [
            { id: 'terminal', title: 'Terminal', icon: '💻', w: 720, h: 460, category: 'system', installed: true },
            { id: 'filemanager', title: 'File Manager', icon: '📁', w: 820, h: 520, category: 'system', installed: true },
            { id: 'settings', title: 'Settings', icon: '⚙️', w: 780, h: 520, category: 'system', installed: true },
            { id: 'taskmgr', title: 'Task Manager', icon: '📊', w: 700, h: 480, category: 'system', installed: true },
            { id: 'appstore', title: 'App Store', icon: '🛒', w: 800, h: 540, category: 'system', installed: true },
            { id: 'about', title: 'About', icon: 'ℹ️', w: 600, h: 520, category: 'system', installed: true },
            { id: 'calculator', title: 'Calculator', icon: '🔢', w: 340, h: 500, category: 'utility', installed: true },
            { id: 'editor', title: 'Text Editor', icon: '📝', w: 720, h: 520, category: 'utility', installed: true },
            { id: 'browser', title: 'Browser', icon: '🌐', w: 920, h: 620, category: 'utility', installed: true },
            { id: 'pixelart', title: 'Pixel Art', icon: '🎨', w: 700, h: 520, category: 'utility', installed: true },
            { id: 'minesweeper', title: 'Minesweeper', icon: '💣', w: 420, h: 470, category: 'games', installed: true },
            { id: 'snake', title: 'Snake', icon: '🐍', w: 440, h: 520, category: 'games', installed: true },
            { id: 'spaceshooter', title: 'Space Shooter', icon: '🚀', w: 680, h: 600, category: 'games', installed: true },
            { id: 'paint', title: 'Retro Paint', icon: '🎨', w: 700, h: 520, category: 'utility', installed: true }
        ],

        // Apps available in store
        available: [
            { id: 'doom', name: 'Doom-Like', icon: '👹', category: 'games', desc: 'Classic FPS retro shooter' },
            { id: 'radio', name: 'Retro Radio', icon: '📻', category: 'media', desc: 'Stream synthwave radio' },
            { id: 'chat', name: 'RetroChat', icon: '💬', category: 'utility', desc: 'IRC-style chat client' }
        ],

        get(id) { return this.list.find(a => a.id === id); },

        isInstalled(id) {
            const app = this.get(id);
            return app && app.installed;
        },

        install(id) {
            const app = this.get(id);
            if (app) { app.installed = true; return true; }
            return false;
        }
    };

    /* ============================================================
        7. OS MODULE - Main orchestrator (boot, login, windows)
       ============================================================ */
    const OS = {
        // ---------- Boot Sequence ----------
        async boot() {
            State.loadDefaults();
            FS.init();
            Kernel.init();
            Kernel.bootTime = Date.now();
            await this.runBootSequence();
            setTimeout(() => this.bootComplete(), 500);
        },

        async runBootSequence() {
            const messages = [
                'RetroOS-BIOS v3.14.159',
                'CPU: RetroCore i9 @ 5.5GHz [OK]',
                'Memory Test: 65536 KB [OK]',
                'HDD: 1TB [OK]',
                'Booting...',
                'Linux v6.7.0-retro loaded',
                'Memory available [OK]',
                'Console VGA+ [OK]',
                'Root FS mounted [OK]',
                '[OK] systemd-logind',
                '[OK] NetworkManager',
                '[OK] luna-bus',
                '[OK] luna-service-manager: 14 services',
                '[OK] weston-retro compositor',
                '[OK] User session',
                '[OK] Launcher ready',
                'Welcome to RetroOS webOS v2.0!',
                '[OK] All systems operational'
            ];

            const log = document.getElementById('boot-log');
            const progress = document.getElementById('boot-progress');
            const status = document.getElementById('boot-status');

            for (let i = 0; i < messages.length; i++) {
                const line = document.createElement('div');
                line.className = 'boot-line' + (messages[i].includes('[OK]') ? ' boot-ok' : '');
                line.textContent = messages[i];
                log.appendChild(line);
                progress.style.width = ((i + 1) / messages.length * 100) + '%';
                status.textContent = messages[i];
                if (line.classList.contains('boot-ok')) Audio.beep(900, 20);
                await this.sleep(messages[i].length * 4 + 30);
            }
        },

        bootComplete() {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('login-user').textContent = State.settings.username;
            document.getElementById('login-password').focus();
            Audio.startup();
            document.getElementById('login-btn').onclick = () => OS.login();
            document.getElementById('login-password').onkeypress = (e) => { if (e.key === 'Enter') OS.login(); };
        },

        login() {
            Audio.init();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('desktop').style.display = 'block';
            this.initUI();
            setTimeout(() => this.notify('Welcome', `Hello ${State.settings.username}!`, 'system'), 500);
            Audio.notify();
        },

        initUI() {
            this.renderDesktop();
            this.renderWallpaper();
            this.bindGlobalEvents();
            this.startClock();
            this.startSystemMonitor();
            this.applyWallpaper(State.settings.wallpaper);
            document.getElementById('start-user').textContent = '@' + State.settings.username;
        },

        sleep(ms) { return new Promise(r => setTimeout(r, ms)); },

        // ---------- Desktop & Wallpaper ----------
        renderDesktop() {
            const container = document.getElementById('desktop-icons');
            container.innerHTML = '';
            ['terminal', 'filemanager', 'browser', 'spaceshooter', 'settings', 'appstore', 'taskmgr', 'minesweeper'].forEach(id => {
                const app = AppRegistry.get(id);
                if (!app || !app.installed) return;
                const el = document.createElement('div');
                el.className = 'desktop-icon';
                el.innerHTML = `<div class="desktop-icon-img">${app.icon}</div><div class="desktop-icon-label">${app.title}</div>`;
                el.ondblclick = () => this.openApp(id);
                container.appendChild(el);
            });
        },

        renderWallpaper() {
            const wp = document.getElementById('wallpaper');
            wp.innerHTML = '';
            const t = State.settings.wallpaper || 'default';

            if (t === 'default') {
                wp.className = 'wp-default';
                wp.innerHTML = '<div class="wp-sun"></div><div class="wp-mountains"></div>';
            } else if (t === 'matrix') {
                wp.className = 'wp-matrix';
                const canvas = document.createElement('canvas');
                canvas.className = 'matrix-canvas';
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                wp.appendChild(canvas);
                this.startMatrix(canvas);
            } else if (t === 'stars') {
                wp.className = 'wp-stars';
                const canvas = document.createElement('canvas');
                canvas.className = 'stars-canvas';
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                wp.appendChild(canvas);
            }
        },

        startMatrix(canvas) {
            const ctx = canvas.getContext('2d');
            const chars = 'ｱｲｳｴｵRETROOS01234567890<>=';
            const fs = 14;
            const cols = Math.floor(canvas.width / fs);
            const drops = Array(cols).fill(0);

            setInterval(() => {
                ctx.fillStyle = 'rgba(0,0,0,0.06)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = fs + 'px monospace';
                ctx.shadowColor = '#0f0';
                ctx.shadowBlur = 4;
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillStyle = drops[i] * fs > canvas.height * 0.7 ? '#fff' : '#0f0';
                    ctx.fillText(text, i * fs, drops[i] * fs);
                    if (drops[i] * fs > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }, 50);
        },

        applyWallpaper(type) {
            State.settings.wallpaper = type;
            this.renderWallpaper();
        },

        // ---------- Global Events ----------
        bindGlobalEvents() {
            const self = this;

            // Start button
            document.getElementById('start-button').onclick = (e) => {
                e.stopPropagation();
                self.toggleStartMenu();
            };

            // Click outside menus
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#start-menu') && !e.target.closest('#start-button')) {
                    self.toggleStartMenu(false);
                }
                if (!e.target.closest('#context-menu')) {
                    document.getElementById('context-menu').classList.remove('show');
                }
            });

            // Right-click on desktop
            document.getElementById('desktop').addEventListener('contextmenu', (e) => {
                if (e.target.closest('.window')) return;
                e.preventDefault();
                self.showContextMenu(e.clientX, e.clientY, [
                    { icon: '💻', text: 'New Terminal', action: () => self.openApp('terminal') },
                    { icon: '📁', text: 'File Manager', action: () => self.openApp('filemanager') },
                    { icon: '🚀', text: 'Space Shooter', action: () => self.openApp('spaceshooter') },
                    { separator: true },
                    { icon: '⚙️', text: 'Settings', action: () => self.openApp('settings') }
                ]);
            });

            // Start menu search & tabs
            document.getElementById('start-search').oninput = (e) => self.filterStartMenu(e.target.value);
            document.querySelectorAll('.start-tab').forEach(t => {
                t.onclick = () => {
                    document.querySelectorAll('.start-tab').forEach(x => x.classList.remove('active'));
                    t.classList.add('active');
                    self.filterStartMenu(document.getElementById('start-search').value, t.dataset.tab);
                };
            });

            // Start footer buttons
            document.querySelectorAll('.start-footer-btn').forEach(b => {
                b.onclick = () => {
                    self.toggleStartMenu(false);
                    const action = b.dataset.action;
                    if (action === 'power') document.getElementById('power-modal').classList.add('show');
                    else self.openApp(action);
                };
            });

            // Power modal
            document.querySelectorAll('[data-power]').forEach(b => b.onclick = () => self[b.dataset.power]());
            document.getElementById('power-cancel').onclick = () => document.getElementById('power-modal').classList.remove('show');

            // Tray items
            document.getElementById('tray-volume').onclick = () => this.openApp('settings');
            document.getElementById('clock').onclick = () => this.openApp('settings');

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                Audio.init();
                if (e.key === 'Escape') {
                    self.toggleStartMenu(false);
                    document.getElementById('context-menu').classList.remove('show');
                }
                if (e.ctrlKey && e.altKey && e.key === 'ArrowRight') {
                    e.preventDefault();
                    self.switchWorkspace((State.workspace + 1) % State.workspaces);
                }
                if (e.ctrlKey && e.altKey && e.key === 'ArrowLeft') {
                    e.preventDefault();
                    self.switchWorkspace((State.workspace - 1 + State.workspaces) % State.workspaces);
                }
                if (e.ctrlKey && e.key === 'Escape') {
                    e.preventDefault();
                    document.getElementById('power-modal').classList.add('show');
                }
                if (e.altKey && e.key === 'Tab') {
                    e.preventDefault();
                    self.cycleWindow();
                }
            });

            // Mouse particles
            document.addEventListener('mousemove', (e) => State.particleEnabled && this.spawnParticle(e.clientX, e.clientY));
        },

        // ---------- Start Menu ----------
        toggleStartMenu(force) {
            const menu = document.getElementById('start-menu');
            const show = force !== undefined ? force : !menu.classList.contains('show');
            menu.classList.toggle('show', show);
            if (show) {
                this.renderStartMenu();
                document.getElementById('start-search').value = '';
                setTimeout(() => document.getElementById('start-search').focus(), 50);
            }
        },

        renderStartMenu() {
            const container = document.getElementById('start-apps');
            container.innerHTML = '';
            AppRegistry.list.filter(a => a.installed).forEach(app => {
                const el = document.createElement('div');
                el.className = 'start-app';
                el.dataset.cat = app.category;
                el.innerHTML = `<div class="start-app-icon">${app.icon}</div><div class="start-app-name">${app.title}</div>`;
                el.onclick = () => {
                    this.openApp(app.id);
                    this.toggleStartMenu(false);
                    Audio.click();
                };
                container.appendChild(el);
            });
        },

        filterStartMenu(query, cat = 'all') {
            document.querySelectorAll('.start-app').forEach(it => {
                const name = it.querySelector('.start-app-name').textContent.toLowerCase();
                const match = (!query || name.includes(query.toLowerCase())) && (cat === 'all' || it.dataset.cat === cat);
                it.style.display = match ? '' : 'none';
            });
        },

        // ---------- Context Menu ----------
        showContextMenu(x, y, items) {
            const menu = document.getElementById('context-menu');
            menu.innerHTML = '';
            items.forEach(it => {
                if (it.separator) {
                    const sep = document.createElement('div');
                    sep.className = 'context-separator';
                    menu.appendChild(sep);
                } else {
                    const item = document.createElement('div');
                    item.className = 'context-item';
                    item.innerHTML = `<span>${it.icon}</span><span>${it.text}</span>`;
                    item.onclick = () => { it.action(); menu.classList.remove('show'); Audio.click(); };
                    menu.appendChild(item);
                }
            });
            menu.style.left = Math.min(x, innerWidth - 220) + 'px';
            menu.style.top = Math.min(y, innerHeight - 200) + 'px';
            menu.classList.add('show');
        },

        // ---------- Workspaces ----------
        switchWorkspace(idx) {
            State.workspace = idx;
            State.windows.forEach(w => {
                if (w.element) w.element.style.display = (w.workspace || 0) === idx ? '' : 'none';
            });
            this.notify('Workspace', `Switched to workspace ${idx + 1}`, 'system');
        },

        // ---------- Window Management ----------
        openApp(appId, params = {}) {
            const app = AppRegistry.get(appId);
            if (!app || !app.installed) { this.notify('Not installed', appId); return; }

            const existing = State.windows.find(w => w.appId === appId && w.workspace === State.workspace);
            if (existing && !params.newWindow) {
                if (existing.minimized) this.unminimizeWindow(existing.id);
                this.focusWindow(existing.id);
                return;
            }

            const win = {
                id: State.nextWindowId++,
                appId, title: app.title, icon: app.icon,
                x: 80 + (State.windows.length * 30) % 250,
                y: 50 + (State.windows.length * 30) % 180,
                w: app.w, h: app.h,
                zIndex: State.nextZIndex++,
                pid: Kernel.nextPid++,
                workspace: State.workspace
            };

            State.windows.push(win);
            this.renderWindow(win, params);
            this.renderTaskbar();
            setTimeout(() => this.focusWindow(win.id), 10);

            Kernel.addProcess({ pid: win.pid, name: appId, user: State.settings.username, cpu: Math.random() * 3, mem: 30, status: 'running', time: Date.now() });
            this.notify('App Launched', `${app.title} (PID: ${win.pid})`, 'system');
        },

        renderWindow(win, params) {
            const el = document.createElement('div');
            el.className = 'window';
            el.id = 'window-' + win.id;
            el.style.left = win.x + 'px';
            el.style.top = win.y + 'px';
            el.style.width = win.w + 'px';
            el.style.height = win.h + 'px';
            el.style.zIndex = win.zIndex;

            el.innerHTML = `
                <div class="window-titlebar" data-win="${win.id}">
                    <div class="window-titlebar-text">
                        <span>${win.icon}</span><span>${win.title}</span>
                    </div>
                    <div class="window-controls">
                        <button class="win-btn minimize">_</button>
                        <button class="win-btn maximize">▢</button>
                        <button class="win-btn close">✕</button>
                    </div>
                </div>
                <div class="window-content" id="content-${win.id}"></div>
                <div class="window-statusbar">
                    <span>PID: ${win.pid} | ${win.appId}</span>
                    <span>●</span>
                </div>
                <div class="resize-handle resize-n"></div>
                <div class="resize-handle resize-s"></div>
                <div class="resize-handle resize-w"></div>
                <div class="resize-handle resize-e"></div>
                <div class="resize-handle resize-nw"></div>
                <div class="resize-handle resize-ne"></div>
                <div class="resize-handle resize-sw"></div>
                <div class="resize-handle resize-se"></div>
            `;

            document.getElementById('windows-container').appendChild(el);
            win.element = el;
            this.renderAppContent(win, params);

            // Bind controls
            el.querySelector('.close').onclick = () => this.closeWindow(win.id);
            el.querySelector('.minimize').onclick = () => this.minimizeWindow(win.id);
            el.querySelector('.maximize').onclick = () => this.toggleMaximize(win.id);
            el.querySelector('.window-titlebar').ondblclick = (e) => {
                if (!e.target.closest('.win-btn')) this.toggleMaximize(win.id);
            };
            el.onmousedown = () => this.focusWindow(win.id);

            // Make draggable & resizable
            this.makeDraggable(el, win);
            this.makeResizable(el, win);
        },

        makeDraggable(el, win) {
            const titleBar = el.querySelector('.window-titlebar');
            let dragging = false, startX, startY, startLeft, startTop;

            titleBar.addEventListener('mousedown', (e) => {
                if (e.target.closest('.win-btn') || win.maximized) return;
                dragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = win.x;
                startTop = win.y;
                document.body.style.cursor = 'move';

                const onMove = (e) => {
                    if (!dragging) return;
                    win.x = Math.max(0, startLeft + e.clientX - startX);
                    win.y = Math.max(0, startTop + e.clientY - startY);
                    el.style.left = win.x + 'px';
                    el.style.top = win.y + 'px';
                };

                const onUp = () => {
                    dragging = false;
                    document.body.style.cursor = '';
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        },

        makeResizable(el, win) {
            el.querySelectorAll('.resize-handle').forEach(handle => {
                const dirs = handle.classList[1].replace('resize-', '');
                handle.addEventListener('mousedown', (e) => {
                    if (win.maximized) return;
                    e.stopPropagation();
                    let resizing = true;
                    const startX = e.clientX, startY = e.clientY;
                    const startW = win.w, startH = win.h;

                    const onMove = (e) => {
                        if (!resizing) return;
                        const dx = e.clientX - startX, dy = e.clientY - startY;
                        if (dirs.includes('e')) win.w = Math.max(280, startW + dx);
                        if (dirs.includes('s')) win.h = Math.max(180, startH + dy);
                        el.style.width = win.w + 'px';
                        el.style.height = win.h + 'px';
                    };

                    const onUp = () => {
                        resizing = false;
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        },

        focusWindow(id) {
            State.windows.forEach(w => w.element && w.element.classList.remove('active'));
            const win = State.windows.find(w => w.id === id);
            if (!win) return;
            win.element.classList.add('active');
            win.zIndex = State.nextZIndex++;
            win.element.style.zIndex = win.zIndex;
            State.activeWindow = id;
            this.renderTaskbar();
        },

        closeWindow(id) {
            const idx = State.windows.findIndex(w => w.id === id);
            if (idx === -1) return;
            const win = State.windows[idx];
            win.element.style.transition = 'all .2s';
            win.element.style.transform = 'scale(.8)';
            win.element.style.opacity = '0';
            setTimeout(() => {
                win.element.remove();
                if (win._cleanup) win._cleanup();
                State.windows.splice(idx, 1);
                Kernel.removeProcess(win.pid);
                this.renderTaskbar();
            }, 200);
        },

        minimizeWindow(id) {
            const w = State.windows.find(w => w.id === id);
            if (w) {
                w.minimized = true;
                w.element.classList.add('minimized');
                this.renderTaskbar();
            }
        },

        unminimizeWindow(id) {
            const w = State.windows.find(w => w.id === id);
            if (w) {
                w.minimized = false;
                w.element.classList.remove('minimized');
                this.focusWindow(id);
            }
        },

        toggleMaximize(id) {
            const w = State.windows.find(w => w.id === id);
            if (!w) return;
            if (!w.maximized) {
                w.oldBounds = { x: w.x, y: w.y, w: w.w, h: w.h };
                w.x = 0; w.y = 0;
                w.w = innerWidth; w.h = innerHeight - 44;
                w.maximized = true;
            } else {
                w.x = w.oldBounds.x; w.y = w.oldBounds.y;
                w.w = w.oldBounds.w; w.h = w.oldBounds.h;
                w.maximized = false;
            }
            w.element.style.left = w.x + 'px';
            w.element.style.top = w.y + 'px';
            w.element.style.width = w.w + 'px';
            w.element.style.height = w.h + 'px';
        },

        cycleWindow() {
            const visible = State.windows.filter(w => !w.minimized && w.workspace === State.workspace);
            if (!visible.length) return;
            const idx = visible.findIndex(w => w.id === State.activeWindow);
            this.focusWindow(visible[(idx + 1) % visible.length].id);
        },

        renderTaskbar() {
            const container = document.getElementById('taskbar-apps');
            container.innerHTML = '';
            State.windows.filter(w => w.workspace === State.workspace).forEach(win => {
                const el = document.createElement('div');
                el.className = 'taskbar-app' + (win.id === State.activeWindow && !win.minimized ? ' active' : '');
                el.innerHTML = `<span class="taskbar-app-icon">${win.icon}</span><span class="taskbar-app-title">${win.title}</span><button class="taskbar-app-close">✕</button>`;
                el.onclick = (e) => {
                    if (e.target.classList.contains('taskbar-app-close')) this.closeWindow(win.id);
                    else {
                        if (win.minimized) this.unminimizeWindow(win.id);
                        else if (State.activeWindow === win.id) this.minimizeWindow(win.id);
                        else this.focusWindow(win.id);
                    }
                };
                container.appendChild(el);
            });
        },

        // ---------- App Dispatcher ----------
        renderAppContent(win, params) {
            const content = document.getElementById('content-' + win.id);
            const dispatch = {
                terminal: () => Apps.terminal(win, content),
                filemanager: () => Apps.filemanager(win, content, params.path || '/home/retro'),
                settings: () => Apps.settings(win, content),
                calculator: () => Apps.calculator(win, content),
                editor: () => Apps.editor(win, content, params),
                browser: () => Apps.browser(win, content, params),
                minesweeper: () => Apps.minesweeper(win, content),
                paint: () => Apps.paint(win, content),
                pixelart: () => Apps.pixelart(win, content),
                spaceshooter: () => Apps.spaceshooter(win, content),
                snake: () => Apps.snake(win, content),
                taskmgr: () => Apps.taskmgr(win, content),
                appstore: () => Apps.appstore(win, content)
            };
            if (dispatch[win.appId]) dispatch[win.appId]();
        },

        // ---------- Notifications & Effects ----------
        notify(title, body) {
            const el = document.createElement('div');
            el.className = 'notification';
            el.innerHTML = `<button class="notif-close">✕</button><div class="notif-title">${title.toUpperCase()}</div><div class="notif-body">${body}</div>`;
            document.getElementById('notification-area').appendChild(el);
            el.querySelector('.notif-close').onclick = () => el.remove();
            setTimeout(() => el.remove(), 4500);
            Audio.notify();
        },

        showClipboard(text) {
            document.getElementById('clipboard-text').textContent = text.substring(0, 40);
            const ind = document.getElementById('clipboard-indicator');
            ind.classList.add('show');
            setTimeout(() => ind.classList.remove('show'), 1800);
        },

        spawnParticle(x, y) {
            if (Math.random() > 0.7) return;
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);
            setTimeout(() => { p.style.opacity = '0'; p.style.transform = 'translateY(-30px)'; }, 10);
            setTimeout(() => p.remove(), 800);
        },

        startClock() {
            const update = () => {
                const n = new Date();
                document.getElementById('clock').innerHTML = `${n.toLocaleTimeString('hu-HU', { hour12: false })}<div style="font-size:11px;color:var(--phosphor-dim)">${n.toLocaleDateString('hu-HU')}</div>`;
            };
            update();
            setInterval(update, 1000);
        },

        startSystemMonitor() {
            setInterval(() => {
                document.getElementById('cpu-level').textContent = Math.floor(10 + Math.random() * 30 + State.windows.length * 4);
            }, 2000);
        },

        // ---------- Power ----------
        sleep() {
            document.getElementById('power-modal').classList.remove('show');
            document.getElementById('desktop').style.opacity = '.05';
            const wake = () => {
                document.getElementById('desktop').style.opacity = '1';
                document.removeEventListener('click', wake);
            };
            document.addEventListener('click', wake, { once: true });
        },

        restart() {
            document.getElementById('power-modal').classList.remove('show');
            document.getElementById('shutdown-screen').style.display = 'flex';
            document.getElementById('shutdown-msg').textContent = 'RESTARTING...';
            setTimeout(() => location.reload(), 1500);
        },

        shutdown() {
            document.getElementById('power-modal').classList.remove('show');
            document.getElementById('desktop').style.display = 'none';
            document.getElementById('shutdown-screen').style.display = 'flex';
        }
    };

    const Apps = {};

    // ==================== TERMINAL ====================
    Apps.terminal = function(win, container) {
        container.innerHTML = '<div class="terminal-app"></div>';
        const term = container.querySelector('.terminal-app');
        let cwd = '/home/retro', history = [], histIdx = -1;

        const print = (text, cls = '') => {
            const div = document.createElement('div');
            div.className = 'terminal-line ' + cls;
            div.textContent = text;
            term.appendChild(div);
        };

        const newPrompt = () => {
            const line = document.createElement('div');
            line.className = 'terminal-input-line';
            line.innerHTML = `<span style="color:var(--phosphor)">${State.settings.username}@${State.settings.hostname}:${cwd}$&nbsp;</span><input class="term-input" type="text"><span class="boot-cursor"></span>`;
            term.appendChild(line);
            const input = line.querySelector('input');

            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.value;
                    line.querySelector('span:last-child').remove();
                    print(`${State.settings.username}@${State.settings.hostname}:${cwd}$ ${cmd}`, 'terminal-prompt');
                    history.push(cmd);
                    histIdx = history.length;
                    exec(cmd);
                    newPrompt();
                    term.scrollTop = term.scrollHeight;
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (histIdx > 0) histIdx--;
                    input.value = history[histIdx] || '';
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (histIdx < history.length - 1) histIdx++;
                    else histIdx = history.length;
                    input.value = history[histIdx] || '';
                }
            };
            setTimeout(() => input.focus(), 10);
        };

        const exec = (cmd) => {
            const parts = cmd.trim().split(/\s+/);
            const c = parts[0], args = parts.slice(1);
            if (!c) return;
            switch (c) {
                case 'help':
                    print('Commands: help ls cd pwd cat whoami ps ls2 clear exit reboot shutdown', 'terminal-info');
                    break;
                case 'pwd': print(cwd); break;
                case 'whoami': print(State.settings.username); break;
                case 'ls': {
                    const r = FS.resolve(args[0] || cwd);
                    if (r && r.node.type === 'dir') Object.keys(r.node.children).forEach(n => print(n));
                    break;
                }
                case 'cd': {
                    let target = args[0] || '/home/retro';
                    if (target === '..') {
                        const parts = cwd.split('/').filter(p => p);
                        parts.pop();
                        target = parts.length ? '/' + parts.join('/') : '/';
                    } else if (!target.startsWith('/')) {
                        target = cwd === '/' ? '/' + target : cwd + '/' + target;
                    }
                    if (FS.resolve(target)) cwd = target;
                    break;
                }
                case 'cat': {
                    const r = FS.resolve(args[0]);
                    if (r && r.node.type === 'file') print(r.node.content);
                    break;
                }
                case 'ps':
                    print('PID   USER     CPU%  MEM  COMMAND', 'terminal-info');
                    Kernel.processes.forEach(p => print(`${String(p.pid).padStart(5)}  ${p.user.padEnd(8)} ${p.cpu.toFixed(1).padStart(5)}  ${String(p.mem).padStart(4)}  ${p.name}`));
                    break;
                case 'ls2': {
                    const result = Kernel.call('luna://' + args[0], args[1] || 'getStatus', {});
                    print(JSON.stringify(result, null, 2), 'terminal-info');
                    break;
                }
                case 'clear': term.innerHTML = ''; break;
                case 'exit': OS.closeWindow(win.id); break;
                case 'reboot': OS.restart(); break;
                case 'shutdown': OS.shutdown(); break;
                default: print(c + ': command not found', 'terminal-error');
            }
        };

        print('RetroOS webOS Terminal', 'terminal-info');
        print('Try: ls2 com.webos.service.system getSystemInfo', 'terminal-info');
        newPrompt();
    };

    // ==================== CALCULATOR ====================
    Apps.calculator = function(win, container) {
        const compute = (a, b, op) => {
            switch (op) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return b === 0 ? 'Err' : a / b;
            }
        };

        const buttons = [
            { label: 'AC', action: 'clear', type: 'clear' },
            { label: '±', action: 'sign' },
            { label: '%', action: 'percent' },
            { label: '÷', action: '/', type: 'op' },
            { label: '7', action: '7' }, { label: '8', action: '8' }, { label: '9', action: '9' },
            { label: '×', action: '*', type: 'op' },
            { label: '4', action: '4' }, { label: '5', action: '5' }, { label: '6', action: '6' },
            { label: '−', action: '-', type: 'op' },
            { label: '1', action: '1' }, { label: '2', action: '2' }, { label: '3', action: '3' },
            { label: '+', action: '+', type: 'op' },
            { label: '0', action: '0', span: 2 },
            { label: '.', action: '.' },
            { label: '=', action: '=', type: 'eq' }
        ];

        container.innerHTML = `
            <div style="display:flex;flex-direction:column;height:100%;padding:10px;background:var(--window-bg)">
                <div id="calc-d" style="background:#000;border:2px solid var(--phosphor);color:var(--green-phos);padding:14px;font-size:30px;text-align:right;margin-bottom:10px;min-height:70px">0</div>
                <div style="flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:5px">
                    ${buttons.map(b => `<button class="settings-btn calc-btn" data-act="${b.action}" style="font-size:20px;${b.span?'grid-column:span 2':''}${b.type==='op'?'background:linear-gradient(180deg,var(--phosphor),var(--phosphor-dim));color:#000':''}${b.type==='eq'?'background:linear-gradient(180deg,var(--green-phos),#228844);color:#000':''}${b.type==='clear'?'background:linear-gradient(180deg,var(--red-phos),#aa2222);color:#000':''}">${b.label}</button>`).join('')}
                </div>
            </div>`;

        let display = '0', prev = null, op = null, reset = false;
        const disp = container.querySelector('#calc-d');

        container.querySelectorAll('.calc-btn').forEach(b => b.onclick = () => {
            const a = b.dataset.act;
            if (/[0-9]/.test(a)) {
                display = reset || display === '0' ? a : display + a;
                reset = false;
            } else if (a === '.') {
                if (!display.includes('.')) display += '.';
            } else if (a === 'clear') {
                display = '0'; prev = null; op = null;
            } else if (a === 'sign') {
                display = display.startsWith('-') ? display.slice(1) : '-' + display;
            } else if (a === 'percent') {
                display = String(parseFloat(display) / 100);
            } else if (['+', '-', '*', '/'].includes(a)) {
                if (prev !== null && op && !reset) {
                    const r = compute(prev, parseFloat(display), op);
                    display = String(r); prev = r;
                } else prev = parseFloat(display);
                op = a; reset = true;
            } else if (a === '=') {
                if (prev !== null && op) {
                    display = String(compute(prev, parseFloat(display), op));
                    prev = null; op = null; reset = true;
                }
            }
            disp.textContent = display.length > 12 ? parseFloat(display).toExponential(6) : display;
            Audio.click();
        });
    };

    // ==================== FILE MANAGER ====================
    Apps.filemanager = function(win, container, path) {
        const shortcuts = ['/home/retro', '/home/retro/Documents', '/', '/etc/retroos'];

        container.innerHTML = `
            <div style="display:flex;height:100%">
                <div style="width:170px;background:#0a0a1e;border-right:1px solid var(--panel-border);padding:7px;color:var(--phosphor);font-family:'VT323',monospace">
                    ${shortcuts.map(p => `<div class="fm-side" data-path="${p}" style="padding:4px 6px;cursor:pointer">${p.split('/').pop() || 'Root'}</div>`).join('')}
                </div>
                <div style="flex:1;display:flex;flex-direction:column">
                    <div style="background:#1a1a3e;padding:4px 6px;display:flex;gap:3px;border-bottom:1px solid var(--panel-border)">
                        <button class="settings-btn" id="fm-up">▲</button>
                        <input class="settings-input" id="fm-path" style="flex:1" value="${path}">
                    </div>
                    <div id="fm-content" style="flex:1;overflow-y:auto;padding:7px;display:grid;grid-template-columns:repeat(auto-fill,92px);gap:3px;align-content:start"></div>
                </div>
            </div>`;

        let currentPath = path;

        const render = (p) => {
            const r = FS.resolve(p);
            const c = container.querySelector('#fm-content');
            container.querySelector('#fm-path').value = p;

            if (!r) {
                c.innerHTML = `<div style="color:var(--red-phos);padding:15px">Cannot access ${p}</div>`;
                return;
            }

            currentPath = p;
            c.innerHTML = '';
            const items = Object.entries(r.node.children);

            items.forEach(([name, node]) => {
                const item = document.createElement('div');
                item.style.cssText = 'padding:7px 4px;cursor:pointer;border:1px solid transparent;text-align:center';
                const icon = node.type === 'dir' ? '📁' : '📄';
                item.innerHTML = `<div style="font-size:32px">${icon}</div><div style="font-size:12px">${name}</div>`;

                item.ondblclick = () => {
                    if (node.type === 'dir') {
                        render((p === '/' ? '' : p) + '/' + name);
                    } else if (name.endsWith('.txt')) {
                        OS.openApp('editor', { file: { name, content: node.content } });
                    }
                };
                c.appendChild(item);
            });
        };

        container.querySelectorAll('.fm-side').forEach(el => el.onclick = () => render(el.dataset.path));
        container.querySelector('#fm-up').onclick = () => {
            const parts = currentPath.split('/').filter(x => x);
            parts.pop();
            render('/' + parts.join('/'));
        };

        render(path);
    };
