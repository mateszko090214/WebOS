    // ---------------------- MINESWEEPER APP ----------------------
    /**
     * Classic Minesweeper game.
     * 10x10 grid with 15 randomly placed mines.
     * Left-click reveals, right-click flags.
     * Flood-fill reveals empty cells.
     */
    Apps.minesweeper = function(win, container) {
        const SIZE = 10, MINES = 15;
        let board = [], revealed = [], flagged = [], over = false, won = false;

        // Initialize random mine layout and neighbor counts
        const init = () => {
            board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            revealed = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
            flagged = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
            over = false; won = false;
            let placed = 0;
            while (placed < MINES) { const x = Math.floor(Math.random() * SIZE), y = Math.floor(Math.random() * SIZE); if (board[y][x] !== -1) { board[y][x] = -1; placed++; } }
            for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
                if (board[y][x] === -1) continue;
                let c = 0;
                for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
                    if (!dy && !dx) continue;
                    const ny = y + dy, nx = x + dx;
                    if (ny >= 0 && ny < SIZE && nx >= 0 && nx < SIZE && board[ny][nx] === -1) c++;
                }
                board[y][x] = c;
            }
        };

        // Render the minefield grid
        const render = () => {
            const colors = ['', '#0000ff', '#008000', '#ff0000', '#000080', '#800000', '#008080', '#000', '#808080'];
            let html = `<div style="padding:12px;height:100%;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--phosphor);font-family:VT323"><div>Mines: ${MINES - flagged.flat().filter(f => f).length} | ${over ? (won ? '🏆 WIN' : '💥 LOSE') : 'Playing'}</div><div style="display:grid;grid-template-columns:repeat(${SIZE},26px);gap:1px;border:3px solid var(--phosphor);padding:3px;background:#000">`;
            for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
                let bg = '#3a3a5e', content = '', c = '#ffb000';
                if (revealed[y][x]) { if (board[y][x] === -1) { bg = '#ff4444'; content = '💣'; } else if (board[y][x] > 0) { c = colors[board[y][x]]; content = board[y][x]; bg = '#1a1a3e'; } else bg = '#1a1a3e'; }
                else if (flagged[y][x]) { content = '🚩'; bg = '#5a5a7e'; }
                html += `<div data-x="${x}" data-y="${y}" style="width:26px;height:26px;background:${bg};display:flex;align-items:center;justify-content:center;color:${c};cursor:pointer;font-weight:bold">${content}</div>`;
            }
            html += `</div></div>`;
            container.innerHTML = html;
            // Bind cell clicks after rendering
            container.querySelectorAll('[data-x]').forEach(cell => {
                const x = parseInt(cell.dataset.x), y = parseInt(cell.dataset.y);
                // Left-click to reveal
                cell.onclick = () => {
                    if (over || revealed[y][x] || flagged[y][x]) return;
                    if (board[y][x] === -1) {
                        // Mine hit - game over
                        revealed[y][x] = true; over = true;
                        for (let yy = 0; yy < SIZE; yy++) for (let xx = 0; xx < SIZE; xx++) if (board[yy][xx] === -1) revealed[yy][xx] = true;
                    } else {
                        // Flood fill: reveal all connected empty cells
                        const q = [[x, y]];
                        while (q.length) {
                            const [cx, cy] = q.shift();
                            if (revealed[cy][cx] || flagged[cy][cx]) continue;
                            revealed[cy][cx] = true;
                            if (board[cy][cx] === 0) {
                                for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
                                    if (!dy && !dx) continue;
                                    const nx = cx + dx, ny = cy + dy;
                                    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && !revealed[ny][nx]) q.push([nx, ny]);
                                }
                            }
                        }
                        // Win check: all non-mine cells revealed?
                        let u = 0;
                        for (let yy = 0; yy < SIZE; yy++) for (let xx = 0; xx < SIZE; xx++) if (!revealed[yy][xx] && board[yy][xx] !== -1) u++;
                        if (u === 0) { over = true; won = true; }
                    }
                    render();
                };
                // Right-click to flag
                cell.oncontextmenu = (e) => { e.preventDefault(); if (over || revealed[y][x]) return; flagged[y][x] = !flagged[y][x]; render(); };
            });
        };
        init(); render();
    };

    // ---------------------- PIXEL ART APP ----------------------
    /**
     * 32x32 pixel art editor.
     * Tools: Pen (draw), Eraser (remove), Fill (bucket).
     * 12-color palette on the sidebar.
     */
    Apps.pixelart = function(win, container) {
        const GRID = 32, TILE = 12;  // 32x32 grid with 12px tiles
        const colors = ['#000', '#fff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffb000', '#8338ec', '#06ffa5', '#ff006e'];
        let curColor = '#ffb000', curTool = 'pen';
        let grid = Array(GRID * GRID).fill('#1a1a3e');  // Initialize all cells to dark blue

        // Render toolbar + canvas area
        container.innerHTML = `<div style="display:flex;height:100%;background:#000;color:var(--phosphor);font-family:'VT323',monospace"><div style="width:140px;background:#0a0a1e;border-right:1px solid var(--phosphor);padding:10px"><button class="settings-btn pa-tool" data-t="pen" style="display:block;width:100%;margin-bottom:4px">✏️ Pen</button><button class="settings-btn pa-tool" data-t="eraser" style="display:block;width:100%;margin-bottom:4px">🧽 Eraser</button><button class="settings-btn pa-tool" data-t="fill" style="display:block;width:100%;margin-bottom:4px">🪣 Fill</button><div style="margin-top:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px">${colors.map(c => `<div class="pa-c" data-c="${c}" style="width:100%;height:30px;background:${c};border:2px solid ${c === curColor ? '#fff' : '#1a1a3e'};cursor:pointer"></div>`).join('')}</div></div><div style="flex:1;display:flex;align-items:center;justify-content:center;background:#000"><canvas id="pa-c" width="${GRID * TILE}" height="${GRID * TILE}" style="image-rendering:pixelated;border:2px solid var(--phosphor);cursor:crosshair;background:#0a0a1e"></canvas></div></div>`;

        const cvs = container.querySelector('#pa-c'); const ctx = cvs.getContext('2d'); let drawing = false;
        // Redraw the entire grid
        const drawAll = () => { for (let i = 0; i < grid.length; i++) { ctx.fillStyle = grid[i]; ctx.fillRect((i % GRID) * TILE, Math.floor(i / GRID) * TILE, TILE, TILE); } };
        drawAll();

        // Convert mouse coordinates to grid cell
        const getCell = (e) => {
            const r = cvs.getBoundingClientRect();
            const px = Math.floor((e.clientX - r.left) * (cvs.width / r.width) / TILE);
            const py = Math.floor((e.clientY - r.top) * (cvs.height / r.height) / TILE);
            return { px, py };
        };

        // Mouse down: apply tool
        cvs.onmousedown = e => {
            drawing = true;
            const { px, py } = getCell(e);
            if (curTool === 'fill') {
                // Flood-fill algorithm (4-directional)
                const target = grid[py * GRID + px];
                if (target !== curColor) {
                    const stack = [[px, py]];
                    while (stack.length) {
                        const [cx, cy] = stack.pop();
                        if (cx < 0 || cy < 0 || cx >= GRID || cy >= GRID) continue;
                        if (grid[cy * GRID + cx] !== target) continue;
                        grid[cy * GRID + cx] = curColor;
                        stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
                    }
                    drawAll();
                }
            } else {
                grid[py * GRID + px] = curTool === 'eraser' ? '#1a1a3e' : curColor;
                drawAll();
            }
        };

        // Drag to draw continuously with pen/eraser
        cvs.onmousemove = e => {
            if (!drawing || (curTool !== 'pen' && curTool !== 'eraser')) return;
            const { px, py } = getCell(e);
            if (px >= 0 && px < GRID && py >= 0 && py < GRID) {
                grid[py * GRID + px] = curTool === 'eraser' ? '#1a1a3e' : curColor;
                drawAll();
            }
        };

        cvs.onmouseup = () => drawing = false; cvs.onmouseleave = () => drawing = false;

        // Tool and color selection
        container.querySelectorAll('.pa-tool').forEach(b => b.onclick = () => curTool = b.dataset.t);
        container.querySelectorAll('.pa-c').forEach(c => c.onclick = () => {
            curColor = c.dataset.c;
            container.querySelectorAll('.pa-c').forEach(x => x.style.border = '2px solid #1a1a3e');
            c.style.border = '2px solid #fff';
        });
    };

    /**
     * Classic snake game.
     * Arrow keys to move, eat food to grow.
     * Game over if you hit walls or yourself.
     */
    Apps.snake = function(win, container) {
        // 20x20 grid canvas (400x400 pixels)
        container.innerHTML = '<canvas id="sn-c" width="400" height="400" style="display:block;margin:auto;background:#000;border:2px solid var(--phosphor);image-rendering:pixelated"></canvas>';
        const canvas = container.querySelector('#sn-c'); const ctx = canvas.getContext('2d');
        // Game state: snake body segments, current direction, food position
        let snake = [{ x: 10, y: 10 }], dir = { x: 1, y: 0 }, food = { x: 5, y: 5 }, score = 0, over = false;

        const draw = () => {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 400, 400);
            ctx.fillStyle = '#ff006e'; ctx.shadowColor = '#ff006e'; ctx.shadowBlur = 10;
            ctx.fillRect(food.x * 20 + 2, food.y * 20 + 2, 16, 16);
            snake.forEach((s, i) => { ctx.fillStyle = i === 0 ? '#33ff66' : '#88aa66'; ctx.shadowBlur = i === 0 ? 8 : 0; ctx.fillRect(s.x * 20 + 1, s.y * 20 + 1, 18, 18); });
            ctx.shadowBlur = 0;
            if (over) { ctx.fillStyle = '#ff4444'; ctx.font = 'bold 30px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', 200, 200); }
        };

        // One game step
        const step = () => {
            if (over) return;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            // Collision detection (walls or self)
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) { over = true; draw(); return; }
            snake.unshift(head);
            // Eat food → grow
            if (head.x === food.x && head.y === food.y) { score++; food = { x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20) }; }
            else snake.pop();
            draw();
        };

        // Keyboard controls (arrow keys)
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dir.y !== 1) dir = { x: 0, y: -1 };
            else if (e.key === 'ArrowDown' && dir.y !== -1) dir = { x: 0, y: 1 };
            else if (e.key === 'ArrowLeft' && dir.x !== 1) dir = { x: -1, y: 0 };
            else if (e.key === 'ArrowRight' && dir.x !== -1) dir = { x: 1, y: 0 };
        });
        draw();
        // Game loop: 150ms tick rate
        win._cleanup = setInterval(step, 150);
    };

    // ---------------------- SPACE SHOOTER APP ----------------------
    /**
     * Top-down scrolling shooter game.
     * Move with arrow keys, shoot with space.
     * 5 enemy types, power-ups, progressive waves.
     */
    Apps.spaceshooter = function(win, container) {
        container.innerHTML = `<div style="display:flex;flex-direction:column;height:100%;background:#000;color:var(--phosphor);font-family:'VT323',monospace"><div style="display:flex;justify-content:space-between;padding:6px 12px;background:#1a1a3e;border-bottom:1px solid var(--phosphor)"><div>🚀 <span id="ss-score">0</span> | ❤️ <span id="ss-hp">3</span> | Wave <span id="ss-wave">1</span> | 🔫 <span id="ss-wpn">NORMAL</span></div></div><div style="flex:1;position:relative;background:radial-gradient(ellipse at center,#1a0a3e 0%,#000 100%)"><canvas id="ss-c" width="640" height="500" style="width:100%;height:100%;display:block;image-rendering:pixelated"></canvas><div id="ss-overlay" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.7);text-shadow:0 0 20px var(--phosphor-glow)"><h1 style="font-family:'Press Start 2P',monospace;font-size:32px;margin-bottom:20px">🚀 SPACE SHOOTER</h1><button class="settings-btn primary" id="ss-start" style="padding:12px 30px;font-size:18px">▶ START</button></div></div></div>`;
        const cvs = container.querySelector('#ss-c'); const ctx = cvs.getContext('2d'); cvs.width = 640; cvs.height = 500;

        // Keyboard state
        const keys = {};
        let running = false, score = 0, hp = 3, wave = 1, weapon = 'NORMAL', specials = 0;
        let player, bullets, enemies, ebullets, powerups, stars, spawnT, animId;

        // Initialize game state
        const init = () => { score = 0; hp = 3; wave = 1; weapon = 'NORMAL'; specials = 0; player = { x: 320, y: 430, speed: 5, cd: 0 }; bullets = []; enemies = []; ebullets = []; powerups = []; stars = []; for (let i = 0; i < 50; i++) stars.push({ x: Math.random() * 640, y: Math.random() * 500, s: Math.random() * 2 + 0.5 }); spawnT = 0; };

        // Shoot (respects weapon cooldown)
        const shoot = () => { if (player.cd > 0) return; Audio.beep(800, 40, 'square', 0.04); bullets.push({ x: player.x + 14, y: player.y - 6, w: 4, h: 10, dy: -9, dmg: weapon === 'MISSILE' ? 3 : 1 }); player.cd = 8; };

        // Game update logic (per frame)
        const update = () => {
            if (keys.ArrowLeft || keys.a) player.x -= player.speed;
            if (keys.ArrowRight || keys.d) player.x += player.speed;
            player.x = Math.max(0, Math.min(608, player.x));
            if (player.cd > 0) player.cd--;
            if (keys[' '] || keys.Space) shoot();
            // Move bullets and remove offscreen
            bullets = bullets.filter(b => (b.y += b.dy) > -20 && b.y < 520);
            spawnT++;
            // Spawn enemies periodically (rate increases with wave)
            if (spawnT > 50 - wave * 7) {
                spawnT = 0;
                const types = ['grunt', 'grunt', 'zigzag', 'shooter'];
                if (wave >= 2) types.push('tank');
                const t = { grunt: { w: 28, h: 28, hp: 1, sp: 1.5, sc: 30, c: '#ff4444' }, zigzag: { w: 24, h: 24, hp: 1, sp: 1.8, sc: 50, c: '#ff00ff', pat: 'zig' }, shooter: { w: 32, h: 32, hp: 2, sp: 1, sc: 80, c: '#ff8500', shoots: true }, tank: { w: 40, h: 40, hp: 5, sp: 0.6, sc: 150, c: '#8338ec' } }[types[Math.floor(Math.random() * types.length)]];
                enemies.push({ x: Math.random() * (640 - t.w), y: -t.h, w: t.w, h: t.h, hp: t.hp, sp: t.sp, sc: t.sc, c: t.c, time: 0, pat: t.pat || 'straight', shoots: t.shoots || false });
            }
            // Update enemies and check collisions
            enemies = enemies.filter(e => {
                e.time++; e.y += e.sp;
                if (e.pat === 'zigzag') e.x += Math.sin(e.time * 0.1) * 3;
                if (e.shoots && e.time % 80 === 0) ebullets.push({ x: e.x + e.w / 2, y: e.y + e.h, dy: 3 });
                for (let i = bullets.length - 1; i >= 0; i--) { const b = bullets[i]; if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) { e.hp -= b.dmg; bullets.splice(i, 1); if (e.hp <= 0) { score += e.sc; return false; } } }
                if (player.x < e.x + e.w && player.x + 32 > e.x && player.y < e.y + e.h && player.y + 32 > e.y) { hp--; return false; }
                return e.y < 520;
            });
            // Update power-ups
            powerups = powerups.filter(p => { p.y += 1.5; if (player.x < p.x + 16 && player.x + 32 > p.x && player.y < p.y + 16 && player.y + 32 > p.y) { if (p.type === 'HEAL') hp = Math.min(5, hp + 1); else if (p.type === 'SPECIAL') specials++; else weapon = p.type; return false; } return p.y < 520; });
            // Update enemy bullets
            ebullets = ebullets.filter(b => { b.y += b.dy; if (player.x < b.x + 8 && player.x + 32 > b.x && player.y < b.y + 8 && player.y + 32 > b.y) { hp--; return false; } return b.y < 520; });
            // Advance wave when all enemies cleared
            if (enemies.length === 0) { wave++; if (wave > 5) wave = 5; }
            // Update HUD
            container.querySelector('#ss-score').textContent = score; container.querySelector('#ss-hp').textContent = hp; container.querySelector('#ss-wave').textContent = wave; container.querySelector('#ss-wpn').textContent = weapon;
            if (hp <= 0) { running = false; if (animId) cancelAnimationFrame(animId); }
        };

        const render = () => {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 640, 500);
            stars.forEach(s => { ctx.fillStyle = '#ffb000'; ctx.fillRect(s.x, s.y, s.s, s.s); });
            // Draw player as triangle ship
            if (hp > 0) { ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 15; ctx.beginPath(); ctx.moveTo(player.x + 16, player.y); ctx.lineTo(player.x, player.y + 32); ctx.lineTo(player.x + 10, player.y + 22); ctx.lineTo(player.x + 16, player.y + 28); ctx.lineTo(player.x + 22, player.y + 22); ctx.lineTo(player.x + 32, player.y + 32); ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; }
            bullets.forEach(b => { ctx.fillStyle = '#ffb000'; ctx.fillRect(b.x, b.y, b.w, b.h); });
            ebullets.forEach(b => { ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill(); });
            enemies.forEach(e => { ctx.fillStyle = e.c; ctx.fillRect(e.x, e.y, e.w, e.h); });
        };

        // Game loop (60fps)
        const loop = () => { if (!running) return; update(); render(); animId = requestAnimationFrame(loop); };

        init();
        // Start button
        container.querySelector('#ss-start').onclick = () => { document.getElementById('ss-overlay').style.display = 'none'; running = true; loop(); };
        // Keyboard listeners (global to capture key state)
        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);
        render();
        win._cleanup = () => { running = false; if (animId) cancelAnimationFrame(animId); };
    };

    Apps.doom = function(win, container) {
        // Game constants
        const SCREEN_W = 640, SCREEN_H = 400, MAP_W = 16, MAP_H = 16, FOV = Math.PI / 3, MAX_DEPTH = 16;

        // Build the window UI (HUD top, canvas center, minimap bottom-left)
        container.innerHTML = `<div style="display:flex;flex-direction:column;height:100%;background:#000;color:#0f0;font-family:'VT323',monospace;overflow:hidden"><div style="display:flex;justify-content:space-between;padding:4px 12px;background:#1a1a3e;border-bottom:1px solid var(--phosphor);font-size:16px"><div>👹 DOOM-LIKE | ❤️ <span id="doom-hp">100</span> | 🔫 <span id="doom-ammo">30</span> | 🎯 <span id="doom-kills">0</span></div><div>WASD:Move | Click:Shoot | 1-3:Weapons | ESC:Quit</div></div><div style="flex:1;display:flex;position:relative;background:#000"><canvas id="doom-canvas" width="${SCREEN_W}" height="${SCREEN_H}" style="display:block;width:100%;height:100%;image-rendering:pixelated;cursor:crosshair"></canvas><canvas id="doom-minimap" width="120" height="120" style="position:absolute;bottom:8px;left:8px;border:2px solid var(--phosphor);background:rgba(0,0,0,.7)"></canvas><div id="doom-overlay" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.85);text-shadow:0 0 15px #ff0000"><h1 style="font-family:'Press Start 2P',monospace;font-size:36px;color:#ff4444;margin-bottom:20px">👹 DOOM-LIKE</h1><p style="font-size:20px;color:#0f0;margin-bottom:25px">Mars base assault - Episode 1</p><button id="doom-start" class="settings-btn primary" style="padding:14px 35px;font-size:18px;margin-bottom:15px">▶ START MISSION</button><div style="color:var(--phosphor);font-size:15px;text-align:center;line-height:1.7">WASD / Arrow keys: Move + Strafe<br>Mouse Click: Shoot<br>1-2-3: Switch Weapons<br>ESC: Pause / Quit</div></div><div id="doom-hud-dmg" style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle, transparent 50%, rgba(255,0,0,0) 50%);transition:background .1s"></div></div></div>`;

        // Canvas and overlay references
        const canvas = container.querySelector('#doom-canvas'); const ctx = canvas.getContext('2d'); canvas.width = SCREEN_W; canvas.height = SCREEN_H;
        const miniCanvas = container.querySelector('#doom-minimap'); const miniCtx = miniCanvas.getContext('2d');
        const overlay = container.querySelector('#doom-overlay'); const dmgOverlay = container.querySelector('#doom-hud-dmg');

        // Sound effects (different beeps for different actions)
        const snd = {
            shoot: () => Audio.beep(180, 80, 'sawtooth', 0.08),
            shoot2: () => Audio.beep(120, 150, 'square', 0.1),
            hit: () => Audio.beep(400, 50, 'square', 0.06),
            pain: () => Audio.beep(200, 200, 'sawtooth', 0.08),
            pickup: () => Audio.beep(880, 100, 'sine', 0.06)
        };

        // Enemy type definitions (stats per type)
        const ENEMY_TYPES = {
            imp: { w: 16, h: 32, hp: 20, spd: 0.025, color: '#ff6644', score: 100, dmg: 8, sight: 6 },
            demon: { w: 32, h: 48, hp: 60, spd: 0.04, color: '#cc3322', score: 200, dmg: 12, sight: 7 },
            soldier: { w: 16, h: 40, hp: 30, spd: 0.035, color: '#888888', score: 150, dmg: 10, sight: 8 },
            caco: { w: 28, h: 28, hp: 80, spd: 0.02, color: '#cc44aa', score: 300, dmg: 15, sight: 10 },
            boss: { w: 48, h: 64, hp: 200, spd: 0.03, color: '#ff2222', score: 1000, dmg: 25, sight: 12 }
        };

        // Game state
        let state = 'menu', level = 0, totalKills = 0, map = [];
        let player = { x: 1.5, y: 1.5, angle: 0, hp: 100, ammo: 30, kills: 0, weapon: 0 };
        let enemies = [], bullets = [], particles = [];
        let weaponAnim = 0, animId = null, damageFlash = 0;

        // Weapon definitions
        const WEAPONS = [
            { name: 'PISTOL', ammoUse: 1, damage: 25, color: '#ffaa00', spread: 0.02 },
            { name: 'SHOTGUN', ammoUse: 2, damage: 15, color: '#ff6600', spread: 0.15, pellets: 5 },  // 5 pellets!
            { name: 'PLASMA', ammoUse: 3, damage: 40, color: '#00ffff', spread: 0.01 }
        ];

        // Wall collision helper
        const isWall = (x, y) => { const ix = Math.floor(x), iy = Math.floor(y); if (ix < 0 || iy < 0 || ix >= MAP_W || iy >= MAP_H) return true; return map[iy][ix] === 1; };
        const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

        // Generate map layout for a given level
        function generateMap(lvl) {
            const m = [];
            for (let y = 0; y < MAP_H; y++) { const row = []; for (let x = 0; x < MAP_W; x++) { if (x === 0 || y === 0 || x === MAP_W - 1 || y === MAP_H - 1) row.push(1); else row.push(0); } m.push(row); }
            if (lvl === 0) {  // Level 1: simple maze
                m[3][3] = m[3][4] = m[3][5] = 1; m[8][8] = m[8][9] = m[8][10] = 1; m[5][7] = m[6][7] = m[7][7] = m[5][10] = m[6][10] = m[7][10] = 1;
                m[5][5] = 3; m[10][10] = 4; m[7][3] = 3;
            } else if (lvl === 1) {  // Level 2: checkerboard pattern
                for (let y = 3; y < 13; y++) for (let x = 5; x < 11; x++) if ((x + y) % 3 === 0) m[y][x] = 1;
                m[4][4] = 3; m[11][11] = 4;
            } else {  // Levels 3+: random maze
                for (let i = 0; i < 30; i++) { const cx = 2 + Math.floor(Math.random() * 12), cy = 2 + Math.floor(Math.random() * 12); for (let dy = 0; dy < 3; dy++) for (let dx = 0; dx < 3; dx++) if (cy + dy < MAP_H - 1 && cx + dx < MAP_W - 1) m[cy + dy][cx + dx] = 1; }
                let pickups = 0; while (pickups < 3) { const px = 2 + Math.floor(Math.random() * 12), py = 2 + Math.floor(Math.random() * 12); if (m[py][px] === 0) { m[py][px] = Math.random() < 0.5 ? 3 : 4; pickups++; } }
            }
            return m;
        }

        // Load a level: regenerate map, reset player, spawn enemies
        function loadLevel(idx) {
            level = idx; map = generateMap(idx);
            player.x = 1.5; player.y = 1.5; player.angle = 0; player.hp = 100; player.ammo = 30 + idx * 10; player.kills = 0;
            enemies = []; bullets = []; particles = []; weaponAnim = 0;
            // Progressive enemy types (harder enemies in later levels)
            const enemyTypes = ['imp', 'imp', 'soldier', 'demon'];
            if (idx >= 1) enemyTypes.push('caco');
            if (idx >= 2) enemyTypes.push('demon');
            if (idx >= 4) enemyTypes.push('boss');
            // Spawn enemies at random positions (avoid player spawn point)
            const numEnemies = 4 + idx * 2;
            for (let i = 0; i < numEnemies; i++) {
                let attempts = 0;
                while (attempts++ < 50) { const ex = 1.5 + Math.random() * (MAP_W - 3), ey = 1.5 + Math.random() * (MAP_H - 3); if (!isWall(ex, ey) && dist({ x: ex, y: ey }, player) > 4) { const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)]; enemies.push({ ...ENEMY_TYPES[type], type, x: ex, y: ey, hp: ENEMY_TYPES[type].hp, state: 'idle', lastShot: 0, angle: 0 }); break; } }
            }
        }

        // Input handling
        const keys = {};
        canvas.addEventListener('click', () => { if (state === 'playing') shoot(); });
        const onKD = (e) => {
            Audio.init();
            // ESC toggles pause
            if (e.key === 'Escape' && state === 'playing') { state = 'paused'; showPause(); }
            else if (e.key === 'Escape' && state === 'paused') { state = 'playing'; hidePause(); }
            else if (state === 'playing') {
                keys[e.key.toLowerCase()] = true;
                // Weapon switching (1, 2, 3)
                if (e.key === '1') player.weapon = 0;
                if (e.key === '2') player.weapon = Math.min(1, player.weapon + 1);
                if (e.key === '3') player.weapon = Math.min(2, player.weapon + 1);
            }
        };
        const onKU = (e) => { keys[e.key.toLowerCase()] = false; };
        document.addEventListener('keydown', onKD); document.addEventListener('keyup', onKU);

        // Pause menu
        function showPause() { overlay.style.display = 'flex'; overlay.innerHTML = `<h1 style="font-family:'Press Start 2P',monospace;font-size:32px;color:var(--phosphor);margin-bottom:15px">⏸ PAUSED</h1><p style="font-size:18px;color:#0f0;margin-bottom:20px">Press ESC to resume</p><button id="doom-quit" class="settings-btn" style="padding:10px 25px">✕ QUIT MISSION</button>`; document.getElementById('doom-quit').onclick = () => OS.closeWindow(win.id); }
        function hidePause() { overlay.style.display = 'none'; overlay.innerHTML = ''; }

        // Player shooting (weapon-aware)
        function shoot() {
            if (player.ammo < WEAPONS[player.weapon].ammoUse) return;
            player.ammo -= WEAPONS[player.weapon].ammoUse;
            weaponAnim = 8;  // Trigger muzzle flash animation
            const w = WEAPONS[player.weapon];
            if (w.pellets) {
                // Shotgun: multiple pellets with spread
                snd.shoot2();
                for (let i = 0; i < w.pellets; i++) {
                    const spread = (Math.random() - 0.5) * w.spread;
                    bullets.push({ x: player.x, y: player.y, angle: player.angle + spread, damage: w.damage, color: w.color, owner: 'player' });
                }
            } else {
                snd.shoot();
                const spread = (Math.random() - 0.5) * w.spread;
                bullets.push({ x: player.x, y: player.y, angle: player.angle + spread, damage: w.damage, color: w.color, owner: 'player' });
            }
        }

        // Per-frame game state update
        function update() {
            if (state !== 'playing') return;
            const speed = 0.05, rotSpeed = 0.03;
            let dx = 0, dy = 0;
            // WASD/Arrow movement (forward/backward + strafe)
            if (keys['w'] || keys['arrowup']) { dx += Math.cos(player.angle) * speed; dy += Math.sin(player.angle) * speed; }
            if (keys['s'] || keys['arrowdown']) { dx -= Math.cos(player.angle) * speed; dy -= Math.sin(player.angle) * speed; }
            if (keys['a']) { dx += Math.cos(player.angle - Math.PI / 2) * speed; dy += Math.sin(player.angle - Math.PI / 2) * speed; }
            if (keys['d']) { dx += Math.cos(player.angle + Math.PI / 2) * speed; dy += Math.sin(player.angle + Math.PI / 2) * speed; }
            // Look left/right
            if (keys['arrowleft']) player.angle -= rotSpeed;
            if (keys['arrowright']) player.angle += rotSpeed;
            // Wall sliding: try X, then Y if blocked
            if (!isWall(player.x + dx, player.y)) player.x += dx;
            else if (!isWall(player.x, player.y + dy)) player.y += dy;

            // Item pickups (3 = medikit, 4 = ammo)
            const pxi = Math.floor(player.x), pyi = Math.floor(player.y);
            if (map[pyi] && map[pyi][pxi] === 3) { player.hp = Math.min(100, player.hp + 25); map[pyi][pxi] = 0; snd.pickup(); }
            if (map[pyi] && map[pyi][pxi] === 4) { player.ammo += 10; map[pyi][pxi] = 0; snd.pickup(); }

            // Enemy AI: chase if player visible, idle wander otherwise
            enemies.forEach(e => {
                const d = dist(e, player);
                if (d < e.sight) {
                    e.state = 'chase';
                    e.angle = Math.atan2(player.y - e.y, player.x - e.x);
                    if (d > 1.5) {
                        // Move toward player
                        const moveX = Math.cos(e.angle) * e.spd, moveY = Math.sin(e.angle) * e.spd;
                        if (!isWall(e.x + moveX, e.y)) e.x += moveX;
                        else if (!isWall(e.x, e.y + moveY)) e.y += moveY;
                    }
                    // Enemy shoots at player if close
                    const now = Date.now();
                    if (now - e.lastShot > 1500 && d < 5) {
                        e.lastShot = now;
                        bullets.push({ x: e.x, y: e.y, angle: e.angle + (Math.random() - 0.5) * 0.2, damage: e.dmg / 2, color: '#ff4444', owner: 'enemy' });
                    }
                } else {
                    e.state = 'idle';
                    // Random wander
                    if (Math.random() < 0.02) e.angle += (Math.random() - 0.5) * 1;
                    const moveX = Math.cos(e.angle) * e.spd * 0.5, moveY = Math.sin(e.angle) * e.spd * 0.5;
                    if (!isWall(e.x + moveX, e.y)) e.x += moveX;
                    if (!isWall(e.x, e.y + moveY)) e.y += moveY;
                }
            });

            // Update bullets (movement + collision detection)
            bullets = bullets.filter(b => {
                b.x += Math.cos(b.angle) * 0.15; b.y += Math.sin(b.angle) * 0.15;
                // Wall hit
                if (isWall(b.x, b.y)) { spawnParticles(b.x, b.y, '#ffaa00', 3); return false; }
                // Player bullet hit enemy?
                if (b.owner === 'player') {
                    for (let i = 0; i < enemies.length; i++) {
                        const e = enemies[i];
                        if (Math.abs(b.x - e.x) < e.w / 16 && Math.abs(b.y - e.y) < e.h / 16) {
                            e.hp -= b.damage; snd.hit(); spawnParticles(b.x, b.y, e.color, 6);
                            if (e.hp <= 0) { player.kills++; totalKills++; enemies.splice(i, 1); }
                            return false;
                        }
                    }
                }
                // Enemy bullet hit player?
                else if (b.owner === 'enemy') {
                    if (Math.abs(b.x - player.x) < 0.3 && Math.abs(b.y - player.y) < 0.3) { player.hp -= b.damage; snd.pain(); return false; }
                }
                return b.x > 0 && b.y > 0 && b.x < MAP_W && b.y < MAP_H;
            });

            // Update particles (fade out and slow down)
            particles = particles.filter(p => { p.x += p.dx; p.y += p.dy; p.dx *= 0.92; p.dy *= 0.92; p.life--; return p.life > 0; });

            // Red damage flash effect (fades over time)
            if (damageFlash > 0) damageFlash -= 0.05;
            dmgOverlay.style.background = `radial-gradient(circle, transparent 50%, rgba(255,0,0,${damageFlash}) 100%)`;

            // Game state checks
            if (player.hp <= 0) gameOver();
            // Advance to next level when all enemies cleared (auto after 1.5s)
            if (enemies.length === 0 && level < 5) setTimeout(() => { loadLevel(level + 1); }, 1500);
            if (enemies.length === 0 && level >= 5) gameWin();
        }

        // Spawn explosion particles
        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) particles.push({ x, y, dx: (Math.random() - 0.5) * 0.1, dy: (Math.random() - 0.5) * 0.1, life: 10, color, size: Math.random() * 2 + 1 });
        }

        // Raycasting renderer (this is the core FPS algorithm)
        function render() {
            // Sky and floor gradients
            const skyGrad = ctx.createLinearGradient(0, 0, 0, SCREEN_H / 2); skyGrad.addColorStop(0, '#1a0a2e'); skyGrad.addColorStop(1, '#3a1a4e'); ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H / 2);
            const floorGrad = ctx.createLinearGradient(0, SCREEN_H / 2, 0, SCREEN_H); floorGrad.addColorStop(0, '#2a2a2a'); floorGrad.addColorStop(1, '#1a1a1a'); ctx.fillStyle = floorGrad; ctx.fillRect(0, SCREEN_H / 2, SCREEN_W, SCREEN_H / 2);

            // Cast 160 vertical rays (one per pixel column)
            const stripWidth = Math.ceil(SCREEN_W / 160);
            for (let i = 0; i < 160; i++) {
                // Calculate ray angle for this column (from FOV/2 left to FOV/2 right)
                const rayAngle = player.angle - FOV / 2 + (i / 160) * FOV;
                let dist = 0, hitX, hitY, hitType = 0;
                // DDA raycasting (step forward until we hit a wall)
                while (dist < MAX_DEPTH) {
                    dist += 0.05;
                    hitX = player.x + Math.cos(rayAngle) * dist;
                    hitY = player.y + Math.sin(rayAngle) * dist;
                    if (isWall(hitX, hitY)) { hitType = 1; break; }
                }
                // Draw the wall column at this x position
                if (hitType === 1) {
                    // Fisheye correction: multiply by cosine of angle difference
                    const correctedDist = dist * Math.cos(rayAngle - player.angle);
                    const wallHeight = Math.min(SCREEN_H, (SCREEN_H / correctedDist) * 1.2);
                    const wallTop = (SCREEN_H - wallHeight) / 2;
                    // Determine which side of the wall was hit (X or Y axis)
                    const tileX = Math.floor(hitX), tileY = Math.floor(hitY);
                    const dx = hitX - tileX, dy = hitY - tileY;
                    const side = dx < 0.02 || dx > 0.98 || dy < 0.02 || dy > 0.98 ? 1 : 0;
                    // Shading: darker = further away, sides are slightly darker
                    const shade = Math.max(0.25, 1 - correctedDist / 8) * (side ? 0.7 : 1);
                    // Wall color varies by tile position for visual variety
                    const wallHue = (tileX * 13 + tileY * 7) % 360;
                    const r = Math.floor((100 + Math.sin(wallHue * 0.01) * 50) * shade);
                    const g = Math.floor((80 + Math.cos(wallHue * 0.01) * 40) * shade);
                    const b = Math.floor((120 + Math.sin(wallHue * 0.013) * 60) * shade);
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    const screenX = (i / 160) * SCREEN_W;
                    ctx.fillRect(screenX, wallTop, stripWidth + 1, wallHeight);
                }
            }

            // Draw enemies (with depth sorting so closer ones overlap farther ones)
            const entities = [];
            enemies.forEach(e => entities.push({ type: 'enemy', data: e, dist: Math.hypot(e.x - player.x, e.y - player.y) }));
            particles.forEach(p => entities.push({ type: 'particle', data: p, dist: Math.hypot(p.x - player.x, p.y - player.y) }));
            entities.sort((a, b) => b.dist - a.dist);  // Sort by distance (far first)

            // Render each entity as a vertical sprite
            entities.forEach(ent => {
                if (ent.type === 'enemy') {
                    const e = ent.data;
                    const angle = Math.atan2(e.y - player.y, e.x - player.x) - player.angle;
                    // Only render if in view frustum
                    if (Math.abs(angle) < FOV / 2 + 0.3) {
                        const screenX = (0.5 + angle / FOV) * SCREEN_W;
                        const height = Math.min(SCREEN_H, (SCREEN_H / ent.dist) * 1.5);
                        const width = (e.w / ent.dist) * (SCREEN_W / 2) * 0.6;
                        const top = (SCREEN_H - height) / 2 + height * 0.15;
                        const shade = Math.max(0.3, 1 - ent.dist / 8);
                        // Different colors per enemy type
                        const enemyHue = { imp: '#ff6644', demon: '#cc3322', soldier: '#888888', caco: '#cc44aa', boss: '#ff2222' }[e.type];
                        ctx.fillStyle = enemyHue; ctx.globalAlpha = shade;
                        ctx.fillRect(screenX - width / 2, top, width, height);
                        // Yellow eyes (except Cacodemon)
                        if (e.type !== 'caco') {
                            ctx.fillStyle = '#ffff00';
                            ctx.fillRect(screenX - width * 0.15, top + height * 0.2, width * 0.1, height * 0.1);
                            ctx.fillRect(screenX + width * 0.05, top + height * 0.2, width * 0.1, height * 0.1);
                        }
                        ctx.globalAlpha = 1;
                    }
                }
            });

            // Draw weapon sprite at bottom of screen (with recoil animation)
            ctx.fillStyle = WEAPONS[player.weapon].color;
            const wepShake = weaponAnim > 0 ? -weaponAnim * 2 : 0;  // Bobbing animation when firing
            const wepW = player.weapon === 1 ? 30 : 20, wepH = player.weapon === 2 ? 50 : 30;
            ctx.fillRect(SCREEN_W / 2 - wepW / 2, SCREEN_H - wepH + wepShake, wepW, wepH);
            // Muzzle flash
            if (weaponAnim > 4) {
                ctx.fillStyle = '#ffff00';
                ctx.beginPath(); ctx.arc(SCREEN_W / 2, SCREEN_H - wepH + wepShake, 15, 0, Math.PI * 2); ctx.fill();
            }
            if (weaponAnim > 0) weaponAnim--;

            // Render minimap (bottom-left corner)
            miniCtx.fillStyle = 'rgba(0,0,0,0.8)'; miniCtx.fillRect(0, 0, 120, 120);
            const cellSize = 7;
            // Draw map cells (walls, pickups, etc.)
            for (let y = 0; y < MAP_H; y++) for (let x = 0; x < MAP_W; x++) {
                if (map[y][x] === 1) miniCtx.fillStyle = '#444';
                else if (map[y][x] === 3) miniCtx.fillStyle = '#33ff66';
                else if (map[y][x] === 4) miniCtx.fillStyle = '#ffaa00';
                else miniCtx.fillStyle = '#0a0a1a';
                miniCtx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
            }
            // Draw enemy dots on minimap
            enemies.forEach(e => {
                miniCtx.fillStyle = e.type === 'boss' ? '#ff0000' : '#ff4444';
                miniCtx.fillRect(e.x * cellSize - 2, e.y * cellSize - 2, 5, 5);
            });
            // Draw player position
            miniCtx.fillStyle = '#00ffff';
            miniCtx.fillRect(player.x * cellSize - 2, player.y * cellSize - 2, 5, 5);

            // Update HUD values
            container.querySelector('#doom-hp').textContent = Math.max(0, Math.floor(player.hp));
            container.querySelector('#doom-ammo').textContent = player.ammo;
            container.querySelector('#doom-kills').textContent = player.kills;
        }

        // Game over screen with highscore saving
        function gameOver() {
            state = 'dead';
            // Save highscore to localStorage
            const hs = JSON.parse(localStorage.getItem('doom_hiscores') || '[]');
            hs.push({ score: totalKills * 100 + (5 - level) * 500, level: level, date: Date.now() });
            hs.sort((a, b) => b.score - a.score);
            localStorage.setItem('doom_hiscores', JSON.stringify(hs.slice(0, 10)));
            // Show game over overlay
            overlay.style.display = 'flex';
            overlay.innerHTML = `<h1 style="font-family:'Press Start 2P',monospace;font-size:42px;color:#ff4444;margin-bottom:18px">☠ YOU DIED</h1><p style="font-size:18px;color:#0f0;margin-bottom:8px">Final Score: ${totalKills * 100}</p><p style="font-size:15px;color:var(--phosphor);margin-bottom:25px">Reached Level E1M${level + 1}</p><p style="font-size:13px;color:var(--phosphor-dim);margin-bottom:25px">Highscore: ${hs[0].score}</p><button id="doom-retry" class="settings-btn primary" style="padding:14px 30px;font-size:18px">↻ TRY AGAIN</button>`;
            document.getElementById('doom-retry').onclick = () => { totalKills = 0; player.hp = 100; player.ammo = 30; loadLevel(0); state = 'playing'; overlay.style.display = 'none'; };
        }

        // Victory screen (all 5 levels completed)
        function gameWin() {
            state = 'win';
            overlay.style.display = 'flex';
            overlay.innerHTML = `<h1 style="font-family:'Press Start 2P',monospace;font-size:32px;color:#ffaa00;margin-bottom:18px">🏆 MARS SECURED</h1><p style="font-size:20px;color:#0f0;margin-bottom:8px">All demons destroyed!</p><p style="font-size:24px;color:var(--phosphor);margin-bottom:18px;text-shadow:0 0 10px var(--phosphor)">Score: ${totalKills * 100 + 5000}</p><p style="font-size:14px;color:var(--phosphor-dim);margin-bottom:25px">You saved humanity!</p><button id="doom-restart" class="settings-btn primary" style="padding:14px 30px;font-size:18px">↻ PLAY AGAIN</button>`;
            document.getElementById('doom-restart').onclick = () => { totalKills = 0; player.hp = 100; player.ammo = 30; loadLevel(0); state = 'playing'; overlay.style.display = 'none'; };
        }

        // Main game loop (60fps via requestAnimationFrame)
        const loop = () => { update(); if (state === 'playing' || state === 'paused') render(); if (animId !== -1) animId = requestAnimationFrame(loop); };

        // Start mission button
        container.querySelector('#doom-start').onclick = () => { totalKills = 0; player.hp = 100; player.ammo = 30; loadLevel(0); state = 'playing'; overlay.style.display = 'none'; animId = requestAnimationFrame(loop); };

        // Cleanup function (called when window closes)
        win._cleanup = () => { animId = -1; document.removeEventListener('keydown', onKD); document.removeEventListener('keyup', onKU); };
    };

    // ===================================================================
    // MODULE 10: PERSISTENCE & BOOT INITIALIZATION
    // ===================================================================

    /**
     * Saves the current persistent state to localStorage.
     * Includes settings and virtual filesystem.
     */
    function saveState() {
        State.persist = {
            settings: State.settings,
            fileSystem: FS.root,
            workspace: State.workspace
        };
        Storage.save(State.persist);
    }

    // Boot the OS when the page loads
    window.addEventListener('load', () => OS.boot());

    // Auto-save every 30 seconds
    setInterval(saveState, 30000);

    // Save before page closes
    window.addEventListener('beforeunload', saveState);

    </script>
</body>
</html>
